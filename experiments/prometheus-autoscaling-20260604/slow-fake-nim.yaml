apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrl-autoscale-slow-nim
  labels:
    app.kubernetes.io/name: nrl-autoscale-slow-nim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nrl-autoscale-slow-nim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nrl-autoscale-slow-nim
    spec:
      containers:
        - name: slow-nim
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              while true; do
                {
                  read request_line || true
                  while IFS= read -r header; do
                    [ "$header" = $'\r' ] && break
                    [ -z "$header" ] && break
                  done
                  sleep 45
                  body='{"status":403,"detail":"slow fake nim"}'
                  printf 'HTTP/1.1 403 Forbidden\r\nContent-Type: application/json\r\nContent-Length: %s\r\nConnection: close\r\n\r\n%s' "${#body}" "$body"
                } | nc -l -p 8000
              done
          ports:
            - name: http
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: nrl-autoscale-slow-nim
  labels:
    app.kubernetes.io/name: nrl-autoscale-slow-nim
spec:
  selector:
    app.kubernetes.io/name: nrl-autoscale-slow-nim
  ports:
    - name: http
      port: 8000
      targetPort: http
