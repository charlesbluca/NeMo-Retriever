# JP20 embedder × reranker sweep — mirrors vllm_bo767_sweep.yaml on 20 PDFs for fast iteration.
#
# Run with:
#   retriever harness sweep --runs-config nemo_retriever/harness/jp20_vl_sweep.yaml
#
# Same 18-run design as vllm_bo767_sweep.yaml; see that file for the full experiment table.
# vLLM VL ingest runs (9-12, 15-18) require vLLM ≥ 0.17 with VL model support.

preset: single_gpu

overrides:
  embed_workers: 1  # vLLM reserves gpu_memory_utilization per actor; VL model ~51 GiB — keep at 1

runs:
  # --- Text model ---
  - name: jp20_text_hf
    dataset: jp20_text_hf
    overrides:
      embed_batch_size: 32  # HF materialises full (batch × seq) activations; 256 OOMs at seq_len=8192

  - name: jp20_text_hf_reranked
    dataset: jp20_text_hf_reranked
    overrides:
      embed_batch_size: 32

  - name: jp20_text_vllm_hf
    dataset: jp20_text_vllm_hf

  - name: jp20_text_vllm_hf_reranked
    dataset: jp20_text_vllm_hf_reranked

  - name: jp20_text_vllm
    dataset: jp20_text_vllm

  - name: jp20_text_vllm_reranked
    dataset: jp20_text_vllm_reranked

  # --- VL model, text modality ---
  - name: jp20_vl_text_hf
    dataset: jp20_vl_text_hf

  - name: jp20_vl_text_hf_reranked
    dataset: jp20_vl_text_hf_reranked

  - name: jp20_vl_text_vllm_hf
    dataset: jp20_vl_text_vllm_hf

  - name: jp20_vl_text_vllm_hf_reranked
    dataset: jp20_vl_text_vllm_hf_reranked

  - name: jp20_vl_text_vllm
    dataset: jp20_vl_text_vllm

  - name: jp20_vl_text_vllm_reranked
    dataset: jp20_vl_text_vllm_reranked

  # --- VL model, text+image modality ---
  - name: jp20_vl_text_image_hf
    dataset: jp20_vl_text_image_hf

  - name: jp20_vl_text_image_hf_reranked
    dataset: jp20_vl_text_image_hf_reranked

  - name: jp20_vl_text_image_vllm_hf
    dataset: jp20_vl_text_image_vllm_hf

  - name: jp20_vl_text_image_vllm_hf_reranked
    dataset: jp20_vl_text_image_vllm_hf_reranked

  - name: jp20_vl_text_image_vllm
    dataset: jp20_vl_text_image_vllm

  - name: jp20_vl_text_image_vllm_reranked
    dataset: jp20_vl_text_image_vllm_reranked

slack:
  enabled: false
  title: JP20 Embedder × Reranker Sweep
  post_artifact_paths: true
  metric_keys:
    - pages
    - ingest_secs
    - pages_per_sec_ingest
    - recall_5
    - recall_10
