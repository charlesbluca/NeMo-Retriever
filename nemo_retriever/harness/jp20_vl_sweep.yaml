# JP20 embedder × reranker sweep — mirrors vllm_bo767_sweep.yaml on 20 PDFs for fast iteration.
#
# Run with:
#   retriever harness sweep --runs-config nemo_retriever/harness/jp20_vl_sweep.yaml
#
# 24-run design: 6 text-model + 6 VL-text-element + 6 VL-text-image-page + 6 VL-text-image-element.
# VL-text uses element granularity (dominates page for text-only recall).
# VL-text-image tests both granularities (page wins recall@10, element wins recall@1).
# vLLM VL ingest runs require vLLM ≥ 0.17 with VL model support.

preset: single_gpu

overrides:
  embed_workers: 1  # vLLM reserves gpu_memory_utilization per actor; VL model ~51 GiB — keep at 1

runs:
  # --- Text model ---
  - name: jp20_text_hf
    dataset: jp20_text_hf
    overrides:
      embed_batch_size: 32  # HF materialises full (batch × seq) activations; 256 OOMs at seq_len=8192

  - name: jp20_text_hf_reranked
    dataset: jp20_text_hf_reranked
    overrides:
      embed_batch_size: 32

  - name: jp20_text_vllm_hf
    dataset: jp20_text_vllm_hf

  - name: jp20_text_vllm_hf_reranked
    dataset: jp20_text_vllm_hf_reranked

  - name: jp20_text_vllm
    dataset: jp20_text_vllm

  - name: jp20_text_vllm_reranked
    dataset: jp20_text_vllm_reranked

  # --- VL model, text modality, element granularity (apples-to-apples vs text model) ---
  - name: jp20_vl_text_hf_element
    dataset: jp20_vl_text_hf_element
    overrides:
      embed_batch_size: 32

  - name: jp20_vl_text_hf_reranked_element
    dataset: jp20_vl_text_hf_reranked_element
    overrides:
      embed_batch_size: 32

  - name: jp20_vl_text_vllm_hf_element
    dataset: jp20_vl_text_vllm_hf_element

  - name: jp20_vl_text_vllm_hf_reranked_element
    dataset: jp20_vl_text_vllm_hf_reranked_element

  - name: jp20_vl_text_vllm_element
    dataset: jp20_vl_text_vllm_element

  - name: jp20_vl_text_vllm_reranked_element
    dataset: jp20_vl_text_vllm_reranked_element

  # --- VL model, text+image modality, page granularity ---
  - name: jp20_vl_text_image_hf
    dataset: jp20_vl_text_image_hf

  - name: jp20_vl_text_image_hf_reranked
    dataset: jp20_vl_text_image_hf_reranked

  - name: jp20_vl_text_image_vllm_hf
    dataset: jp20_vl_text_image_vllm_hf

  - name: jp20_vl_text_image_vllm_hf_reranked
    dataset: jp20_vl_text_image_vllm_hf_reranked

  - name: jp20_vl_text_image_vllm
    dataset: jp20_vl_text_image_vllm

  - name: jp20_vl_text_image_vllm_reranked
    dataset: jp20_vl_text_image_vllm_reranked

  # --- VL model, text+image modality, element granularity ---
  - name: jp20_vl_text_image_hf_element
    dataset: jp20_vl_text_image_hf_element
    overrides:
      embed_batch_size: 32

  - name: jp20_vl_text_image_hf_reranked_element
    dataset: jp20_vl_text_image_hf_reranked_element
    overrides:
      embed_batch_size: 32

  - name: jp20_vl_text_image_vllm_hf_element
    dataset: jp20_vl_text_image_vllm_hf_element

  - name: jp20_vl_text_image_vllm_hf_reranked_element
    dataset: jp20_vl_text_image_vllm_hf_reranked_element

  - name: jp20_vl_text_image_vllm_element
    dataset: jp20_vl_text_image_vllm_element

  - name: jp20_vl_text_image_vllm_reranked_element
    dataset: jp20_vl_text_image_vllm_reranked_element

slack:
  enabled: false
  title: JP20 Embedder × Reranker Sweep
  post_artifact_paths: true
  metric_keys:
    - pages
    - ingest_secs
    - pages_per_sec_ingest
    - recall_5
    - recall_10
