# Harness config for nemo_retriever benchmarks.

active:
  dataset: jp20
  preset: single_gpu
  run_mode: batch
  query_csv: ~/datasets/jp20/query.csv
  input_type: pdf
  recall_required: true
  recall_match_mode: pdf_page
  recall_adapter: none
  evaluation_mode: recall
  beir_loader: null
  beir_dataset_name: null
  beir_split: test
  beir_query_language: null
  beir_doc_id_field: pdf_basename
  beir_ks: [1, 3, 5, 10]
  artifacts_dir: null
  ray_address: null
  lancedb_uri: lancedb
  hybrid: false
  embed_model_name: nvidia/llama-nemotron-embed-1b-v2
  embed_modality: text
  embed_granularity: element
  extract_page_as_image: false
  extract_infographics: false
  write_detection_file: false
  store_images_uri: null
  store_text: false
  strip_base64: true

presets:
  single_gpu:
    pdf_extract_workers: 8
    pdf_extract_num_cpus: 2.0
    pdf_extract_batch_size: 4
    pdf_split_batch_size: 1
    page_elements_batch_size: 4
    page_elements_workers: 3
    ocr_workers: 3
    ocr_batch_size: 16
    embed_workers: 3
    embed_batch_size: 256
    page_elements_cpus_per_actor: 1.0
    ocr_cpus_per_actor: 1.0
    embed_cpus_per_actor: 1.0
    gpu_page_elements: 0.1
    gpu_ocr: 0.1
    gpu_embed: 0.25

  dgx_8gpu:
    pdf_extract_workers: 64
    pdf_extract_num_cpus: 2.0
    pdf_extract_batch_size: 4
    pdf_split_batch_size: 1
    page_elements_batch_size: 32
    page_elements_workers: 24
    ocr_workers: 24
    ocr_batch_size: 16
    embed_workers: 24
    embed_batch_size: 256
    page_elements_cpus_per_actor: 1.0
    ocr_cpus_per_actor: 1.0
    embed_cpus_per_actor: 1.0
    gpu_page_elements: 0.1
    gpu_ocr: 0.1
    gpu_embed: 0.25

datasets:
  bo20:
    path: /datasets/nv-ingest/bo20
    query_csv: null
    input_type: pdf
    recall_required: false

  bo767:
    path: ~/datasets/bo767
    query_csv: data/bo767_annotations.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: bo767_csv
    beir_doc_id_field: pdf_page

  # ── Bo767 embedder × reranker experiment suite (vllm_bo767_sweep.yaml) ─────────────────────
  # Text model: nvidia/llama-nemotron-embed-1b-v2 · text modality · element granularity

  bo767_text_hf:                              # 1: HF ingest · HF query · no reranker
    path: ~/datasets/bo767
    query_csv: data/bo767_annotations.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
