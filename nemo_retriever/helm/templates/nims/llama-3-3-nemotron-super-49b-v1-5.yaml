{{- if and (and (.Capabilities.APIVersions.Has "apps.nvidia.com/v1alpha1") .Values.nims.enabled) (eq .Values.nimOperator.llama_3_3_nemotron_super_49b_v1_5.enabled true) -}}
{{- $cfg := .Values.nimOperator.llama_3_3_nemotron_super_49b_v1_5 -}}
{{- $name := $cfg.nimServiceName -}}
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: {{ $name }}
  {{- include "nemo-retriever.nimcache.keepPolicy" . | nindent 2 }}
spec:
  source:
    ngc:
      modelPuller: "{{ $cfg.image.repository }}:{{ $cfg.image.tag }}"
      pullSecret: "{{ index $cfg.image.pullSecrets 0 }}"
      authSecret: {{ $cfg.authSecret }}
      {{- include "nemo-retriever.nimcache.modelBlock" (dict "context" $ "key" "llama_3_3_nemotron_super_49b_v1_5") | nindent 6 }}
  storage:
    pvc:
      create: {{ $cfg.storage.pvc.create }}
      storageClass: {{ $cfg.storage.pvc.storageClass | quote }}
      size: {{ $cfg.storage.pvc.size }}
      volumeAccessMode: {{ $cfg.storage.pvc.volumeAccessMode }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: {{ $name }}
spec:
  image:
    repository: {{ $cfg.image.repository }}
    tag: {{ $cfg.image.tag }}
    pullPolicy: {{ $cfg.image.pullPolicy }}
    pullSecrets:
{{ toYaml $cfg.image.pullSecrets | indent 6 }}
  authSecret: {{ $cfg.authSecret }}
  storage:
    nimCache:
      name: {{ $name }}
  replicas: {{ $cfg.replicas }}
  nodeSelector:
{{ toYaml $cfg.nodeSelector | indent 4 }}
  {{- include "nemo-retriever.nimServiceResources" (dict "context" $ "resources" $cfg.resources) | nindent 2 }}
  tolerations:
{{ toYaml $cfg.tolerations | indent 4 }}
  expose:
{{ toYaml $cfg.expose | indent 4 }}
  env:
{{ toYaml $cfg.env | indent 4 }}
    - name: NGC_API_KEY
      valueFrom:
        secretKeyRef:
          name: {{ $cfg.authSecret | quote }}
          key: NGC_API_KEY
{{- end }}
