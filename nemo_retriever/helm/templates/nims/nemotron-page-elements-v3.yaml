{{- if and (and (.Capabilities.APIVersions.Has "apps.nvidia.com/v1alpha1") .Values.nims.enabled) (eq .Values.nimOperator.page_elements.enabled true) -}}
{{- $cacheEnabled := eq (include "nemo-retriever.nimcache.enabled" (dict "context" $ "key" "page_elements")) "true" -}}
{{- if $cacheEnabled -}}
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: nemotron-page-elements-v3
  {{- include "nemo-retriever.nimcache.keepPolicy" . | nindent 2 }}
spec:
  source:
    ngc:
      modelPuller: "{{ include "nemo-retriever.nimcache.modelPuller" (dict "context" $ "key" "page_elements") }}"
      pullSecret: "{{ index .Values.nimOperator.page_elements.image.pullSecrets 0 }}"
      authSecret: {{ .Values.nimOperator.page_elements.authSecret }}
      {{- include "nemo-retriever.nimcache.ngcExtras" (dict "context" $ "key" "page_elements") | nindent 6 }}
  storage:
    pvc:
      create: {{ .Values.nimOperator.page_elements.storage.pvc.create }}
      storageClass: {{ .Values.nimOperator.page_elements.storage.pvc.storageClass | quote }}
      size: {{ .Values.nimOperator.page_elements.storage.pvc.size }}
      volumeAccessMode: {{ .Values.nimOperator.page_elements.storage.pvc.volumeAccessMode }}
  resources: {}
{{- end }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: nemotron-page-elements-v3
spec:
  image:
    repository: {{ .Values.nimOperator.page_elements.image.repository }}
    tag: {{ .Values.nimOperator.page_elements.image.tag }}
    pullPolicy: {{ .Values.nimOperator.page_elements.image.pullPolicy }}
    pullSecrets:
{{ toYaml .Values.nimOperator.page_elements.image.pullSecrets | indent 6 }}
  authSecret: {{ .Values.nimOperator.page_elements.authSecret }}
  {{- include "nemo-retriever.nimServiceStorage" (dict "context" $ "key" "page_elements" "name" "nemotron-page-elements-v3" "profile" "") | nindent 2 }}
  replicas: {{ .Values.nimOperator.page_elements.replicas }}
  nodeSelector:
{{ toYaml .Values.nimOperator.page_elements.nodeSelector | indent 4 }}
  {{- include "nemo-retriever.nimServiceResources" (dict "context" $ "resources" .Values.nimOperator.page_elements.resources) | nindent 2 }}
  tolerations:
{{ toYaml .Values.nimOperator.page_elements.tolerations | indent 4 }}
  expose:
{{ toYaml .Values.nimOperator.page_elements.expose | indent 4 }}
  env:
{{ toYaml .Values.nimOperator.page_elements.env | indent 4 }}
{{- end }}
