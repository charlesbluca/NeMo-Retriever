{{- if and (and (.Capabilities.APIVersions.Has "apps.nvidia.com/v1alpha1") .Values.nims.enabled) (eq .Values.nimOperator.table_structure.enabled true) -}}
{{- $cacheEnabled := eq (include "nemo-retriever.nimcache.enabled" (dict "context" $ "key" "table_structure")) "true" -}}
{{- if $cacheEnabled -}}
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: nemotron-table-structure-v1
  {{- include "nemo-retriever.nimcache.keepPolicy" . | nindent 2 }}
spec:
  source:
    ngc:
      modelPuller: "{{ include "nemo-retriever.nimcache.modelPuller" (dict "context" $ "key" "table_structure") }}"
      pullSecret: "{{ index .Values.nimOperator.table_structure.image.pullSecrets 0 }}"
      authSecret: {{ .Values.nimOperator.table_structure.authSecret }}
      {{- include "nemo-retriever.nimcache.ngcExtras" (dict "context" $ "key" "table_structure") | nindent 6 }}
  storage:
    pvc:
      create: {{ .Values.nimOperator.table_structure.storage.pvc.create }}
      storageClass: {{ .Values.nimOperator.table_structure.storage.pvc.storageClass | quote }}
      size: {{ .Values.nimOperator.table_structure.storage.pvc.size }}
      volumeAccessMode: {{ .Values.nimOperator.table_structure.storage.pvc.volumeAccessMode }}
{{- end }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: nemotron-table-structure-v1
spec:
  image:
    repository: {{ .Values.nimOperator.table_structure.image.repository }}
    tag: {{ .Values.nimOperator.table_structure.image.tag }}
    pullPolicy: {{ .Values.nimOperator.table_structure.image.pullPolicy }}
    pullSecrets:
{{ toYaml .Values.nimOperator.table_structure.image.pullSecrets | indent 6 }}
  authSecret: {{ .Values.nimOperator.table_structure.authSecret }}
  {{- include "nemo-retriever.nimServiceStorage" (dict "context" $ "key" "table_structure" "name" "nemotron-table-structure-v1") | nindent 2 }}
  replicas: {{ .Values.nimOperator.table_structure.replicas }}
  nodeSelector:
{{ toYaml .Values.nimOperator.table_structure.nodeSelector | indent 4 }}
  {{- include "nemo-retriever.nimServiceResources" (dict "context" $ "resources" .Values.nimOperator.table_structure.resources) | nindent 2 }}
  tolerations:
{{ toYaml .Values.nimOperator.table_structure.tolerations | indent 4 }}
  expose:
{{ toYaml .Values.nimOperator.table_structure.expose | indent 4 }}
  env:
{{ toYaml .Values.nimOperator.table_structure.env | indent 4 }}
{{- end }}
