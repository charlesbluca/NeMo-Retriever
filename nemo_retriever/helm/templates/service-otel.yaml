{{- $otel := .Values.topology.otel | default dict -}}
{{- if not (kindIs "map" $otel) -}}
{{- fail "topology.otel must be a map" -}}
{{- end -}}
{{- if get $otel "enabled" }}
{{- $otelName := include "nemo-retriever.otel.fullname" . -}}
{{- $otelPorts := include "nemo-retriever.otel.ports" . | fromYaml -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $otelName }}
  labels:
    {{- include "nemo-retriever.role.labels" (dict "context" $ "role" "otel") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" "otel") | nindent 4 }}
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: {{ get $otelPorts "otlpGrpc" }}
      targetPort: otlp-grpc
    - name: otlp-http
      protocol: TCP
      port: {{ get $otelPorts "otlpHttp" }}
      targetPort: otlp-http
    - name: prometheus
      protocol: TCP
      port: {{ get $otelPorts "prometheus" }}
      targetPort: prometheus
{{- end }}
