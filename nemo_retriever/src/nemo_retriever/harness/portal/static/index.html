function DataExportSection({ filteredRuns, filterDataset, filterPreset, filterStatus, dateFrom, dateTo }) {
  const [includeRaw, setIncludeRaw] = useState(true);
  const [exporting, setExporting] = useState(false);
  const [exportFormat, setExportFormat] = useState("json");

  const buildExportFilename = (ext) => `harness_runs_export_${new Date().toISOString().slice(0,10)}.${ext}`;

  const exportJson = async () => {
    setExporting(true);
    try {
      const params = new URLSearchParams();
      if (filterDataset) params.set('dataset', filterDataset);
      if (filterPreset) params.set('preset', filterPreset);
      if (filterStatus && filterStatus !== 'all') params.set('status', filterStatus);
      if (dateFrom) params.set('date_from', dateFrom);
      if (dateTo) params.set('date_to', dateTo);
      params.set('include_raw', includeRaw ? 'true' : 'false');

      const resp = await fetch(`/api/reports/export?${params}`);
      if (resp.ok) {
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = buildExportFilename('json');
        a.click();
        URL.revokeObjectURL(url);
      }
    } catch (e) { console.error('Export failed', e); }
    setExporting(false);
  };

  const exportCsv = () => {
    if (filteredRuns.length === 0) return;
    const fields = ['id','timestamp','dataset','preset','success','hostname','gpu_type',
      'pages_per_sec','recall_1','recall_5','recall_10','ingest_secs','pages','files',
      'trigger_source','git_commit','ray_cluster_mode','ray_dashboard_url'];
    const header = fields.join(',');
    const rows = filteredRuns.map(r =>
      fields.map(f => {
        const v = r[f];
        if (v == null) return '';
        const s = String(v);
        return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = buildExportFilename('csv');
    a.click();
    URL.revokeObjectURL(url);
  };

  const labelStyle = {display:'block',fontSize:'10px',fontWeight:600,color:'var(--nv-text-dim)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.05em'};

  return (
    <div className="card" style={{padding:'20px',marginBottom:'20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
        <h3 style={{margin:0,fontSize:'16px',fontWeight:600}}>Data Export</h3>
        <span style={{fontSize:'12px',color:'var(--nv-text-dim)'}}>{filteredRuns.length} run{filteredRuns.length!==1?'s':''} matching filters</span>
      </div>

      <div style={{display:'flex',gap:'16px',alignItems:'flex-end',flexWrap:'wrap',marginBottom:'16px'}}>
        <div>
          <div style={labelStyle}>Format</div>
          <div style={{display:'flex',gap:'2px',background:'var(--nv-bg)',borderRadius:'8px',padding:'2px',border:'1px solid var(--nv-border)'}}>
            {[{k:'json',l:'JSON'},{k:'csv',l:'CSV'}].map(t=>(
              <button key={t.k} className="btn btn-sm" onClick={()=>setExportFormat(t.k)}
                style={{borderRadius:'6px',padding:'5px 16px',fontSize:'12px',
                  background:exportFormat===t.k?'var(--nv-green)':'transparent',
                  color:exportFormat===t.k?'#000':'var(--nv-text-muted)',
                  fontWeight:exportFormat===t.k?600:400,border:'none'}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>

        {exportFormat === 'json' && (
          <label style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'var(--nv-text-muted)',cursor:'pointer'}}>
            <input type="checkbox" checked={includeRaw} onChange={e=>setIncludeRaw(e.target.checked)}
              style={{accentColor:'var(--nv-green)'}} />
            Include full raw result JSON
          </label>
        )}
      </div>

      <div style={{fontSize:'12px',color:'var(--nv-text-dim)',marginBottom:'16px',lineHeight:'1.5'}}>
        {exportFormat === 'json' ? (
          <>
            Exports a structured JSON file containing all matching runs with metadata, metrics, and
            {includeRaw ? ' full raw result payloads' : ' summary data only'}.
            Ideal for programmatic analysis with Python, notebooks, or other tools.
          </>
        ) : (
          <>
            Exports a flat CSV file with key metrics for each matching run.
            Ideal for spreadsheet analysis, quick reviews, or importing into BI tools.
          </>
        )}
      </div>

      <button className="btn btn-primary" onClick={exportFormat === 'json' ? exportJson : exportCsv}
        disabled={exporting || filteredRuns.length === 0}>
        {exporting ? <><div className="spinner" style={{width:14,height:14}}></div> Exporting…</> : <><IconDownload /> Export {exportFormat.toUpperCase()}</>}
      </button>
    </div>
  );
}

function ReportingView({ runs, datasets, loading }) {
  const [filterDataset, setFilterDataset] = useState("");
  const [filterPreset, setFilterPreset] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [selectedCharts, setSelectedCharts] = useState(REPORT_CHARTS.map(c => c.id));
  const [reportTitle, setReportTitle] = useState("Harness Performance Report");
  const [generating, setGenerating] = useState(false);
  const [previewing, setPreviewing] = useState(false);
  const [previewImages, setPreviewImages] = useState([]);
  const chartRefs = useRef({});
  const canvasRefs = useRef({});

  const allDatasets = useMemo(() => [...new Set(runs.map(r => r.dataset).filter(Boolean))].sort(), [runs]);
  const allPresets = useMemo(() => [...new Set(runs.map(r => r.preset).filter(Boolean))].sort(), [runs]);

  const filteredRuns = useMemo(() => {
    return runs.filter(r => {
      if (filterDataset && r.dataset !== filterDataset) return false;
      if (filterPreset && r.preset !== filterPreset) return false;
      if (filterStatus === "pass" && r.success !== 1) return false;
      if (filterStatus === "fail" && r.success !== 0) return false;
      if (dateFrom || dateTo) {
        const d = parseRunTimestamp(r.timestamp);
        if (!d) return false;
        if (dateFrom && d < new Date(dateFrom + "T00:00:00Z")) return false;
        if (dateTo && d > new Date(dateTo + "T23:59:59Z")) return false;
      }
      return true;
    });
  }, [runs, filterDataset, filterPreset, filterStatus, dateFrom, dateTo]);

  const activeCharts = useMemo(() => REPORT_CHARTS.filter(c => selectedCharts.includes(c.id)), [selectedCharts]);

  const toggleChart = (id) => {
    setSelectedCharts(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const summaryStats = useMemo(() => {
    const out = {};
    for (const m of ANALYTICS_METRICS) {
      const vals = filteredRuns.map(r => r[m.key]).filter(v => v != null);
      if (vals.length === 0) { out[m.key] = null; continue; }
      const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
      const sorted = [...vals].sort((a,b)=>a-b);
      out[m.key] = { avg, min: sorted[0], max: sorted[sorted.length-1], count: vals.length };
    }
    return out;
  }, [filteredRuns]);

  const buildChart = useCallback((canvasEl, chartDef) => {
    if (!canvasEl) return null;
    const metricLabel = (ANALYTICS_METRICS.find(m => m.key === chartDef.metric) || {}).label || chartDef.metric;

    if (chartDef.type === "line") {
      const groups = {};
      filteredRuns.forEach(r => {
        const group = r.dataset || "unknown";
        if (!groups[group]) groups[group] = [];
        const yVal = r[chartDef.metric];
        if (yVal == null) return;
        const date = parseRunTimestamp(r.timestamp);
        if (date) groups[group].push({ x: date, y: yVal });
      });
      const chartDatasets = Object.entries(groups).map(([name, points], i) => ({
        label: name,
        data: points.sort((a, b) => a.x.getTime() - b.x.getTime()),
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '40',
        pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
        tension: 0.3, pointRadius: 4, fill: false, borderWidth: 2,
      }));
      return new Chart(canvasEl, {
        type: 'line',
        data: { datasets: chartDatasets },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { position: 'top', labels: { color: '#333', font: { family: 'Inter', size: 11 }, usePointStyle: true, padding: 12 } },
            title: { display: true, text: chartDef.label, color: '#222', font: { family: 'Inter', size: 14, weight: '600' }, padding: { bottom: 10 } },
          },
          scales: {
            x: { type: 'time', time: { tooltipFormat: 'MMM d, yyyy HH:mm', displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' } },
              ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#eee' }, title: { display: true, text: 'Date', color: '#666' } },
            y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#eee' }, title: { display: true, text: metricLabel, color: '#666' } },
          },
        },
      });
    } else if (chartDef.type === "bar") {
      const groups = {};
      filteredRuns.forEach(r => {
        const group = r.dataset || "unknown";
        if (!groups[group]) groups[group] = [];
        const val = r[chartDef.metric];
        if (val != null) groups[group].push(val);
      });
      const labels = Object.keys(groups).sort();
      const avgData = labels.map(l => { const v = groups[l]; return v.reduce((a,b)=>a+b,0)/v.length; });
      return new Chart(canvasEl, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: `Avg ${metricLabel}`, data: avgData, backgroundColor: labels.map((_,i) => CHART_COLORS[i % CHART_COLORS.length] + 'cc'),
              borderColor: labels.map((_,i) => CHART_COLORS[i % CHART_COLORS.length]), borderWidth: 1, borderRadius: 4 },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            title: { display: true, text: chartDef.label, color: '#222', font: { family: 'Inter', size: 14, weight: '600' }, padding: { bottom: 10 } },
          },
          scales: {
            x: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#eee' } },
            y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#eee' }, title: { display: true, text: metricLabel, color: '#666' } },
          },
        },
      });
    } else if (chartDef.type === "gpu_bar") {
      const nested = {};
      filteredRuns.forEach(r => {
        const gpu = r.gpu_type || "Unknown GPU";
        const ds = r.dataset || "unknown";
        const val = r[chartDef.metric];
        if (val == null) return;
        if (!nested[gpu]) nested[gpu] = {};
        if (!nested[gpu][ds]) nested[gpu][ds] = [];
        nested[gpu][ds].push(val);
      });
      const gpuLabels = Object.keys(nested).sort();
      const allDatasets = [...new Set(filteredRuns.map(r => r.dataset || "unknown"))].sort();
      const chartDatasets = allDatasets.map((ds, i) => ({
        label: ds,
        data: gpuLabels.map(gpu => {
          const vals = (nested[gpu] && nested[gpu][ds]) || [];
          return vals.length > 0 ? +(vals.reduce((a,b)=>a+b,0) / vals.length).toFixed(3) : null;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        borderWidth: 1, borderRadius: 4,
      }));
      return new Chart(canvasEl, {
        type: 'bar',
        data: { labels: gpuLabels, datasets: chartDatasets },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { position: 'top', labels: { color: '#333', font: { family: 'Inter', size: 11 }, usePointStyle: true, padding: 12 } },
            title: { display: true, text: chartDef.label, color: '#222', font: { family: 'Inter', size: 14, weight: '600' }, padding: { bottom: 10 } },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  const v = ctx.parsed.y;
                  return v != null ? `${ctx.dataset.label}: ${v.toFixed(2)}` : '';
                },
                afterBody: function(items) {
                  if (!items.length) return '';
                  const gpu = items[0].label;
                  const ds = items[0].dataset.label;
                  const vals = (nested[gpu] && nested[gpu][ds]) || [];
                  if (vals.length <= 1) return '';
                  return `  (${vals.length} runs)`;
                },
              },
            },
          },
          scales: {
            x: { ticks: { color: '#555', font: { size: 10 }, maxRotation: 45, minRotation: 0 }, grid: { color: '#eee' },
              title: { display: true, text: 'GPU SKU', color: '#666' } },
            y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#eee' },
              title: { display: true, text: metricLabel, color: '#666' }, beginAtZero: true },
          },
        },
      });
    }
    return null;
  }, [filteredRuns]);

  const generatePreview = useCallback(async () => {
    setPreviewing(true);
    setPreviewImages([]);
    Object.values(chartRefs.current).forEach(c => { if (c) c.destroy(); });
    chartRefs.current = {};
    await new Promise(r => setTimeout(r, 100));

    const images = [];
    for (const chartDef of activeCharts) {
      const canvas = canvasRefs.current[chartDef.id];
      if (!canvas) continue;
      const chart = buildChart(canvas, chartDef);
      if (chart) {
        chartRefs.current[chartDef.id] = chart;
        await new Promise(r => setTimeout(r, 500));
        images.push({ id: chartDef.id, label: chartDef.label, dataUrl: chart.toBase64Image('image/png', 1) });
      }
    }
    setPreviewImages(images);
    setPreviewing(false);
  }, [activeCharts, buildChart]);

  useEffect(() => {
    return () => { Object.values(chartRefs.current).forEach(c => { if (c) c.destroy(); }); };
  }, []);

  const downloadSinglePng = (img) => {
    const a = document.createElement('a');
    a.href = img.dataUrl;
    a.download = `${img.id}.png`;
    a.click();
  };

  const downloadAllPngs = async () => {
    if (previewImages.length === 0) return;
    setGenerating(true);
    try {
      const resp = await fetch('/api/reports/bundle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: previewImages.map(img => ({ filename: `${img.id}.png`, data_url: img.dataUrl })) }),
      });
      if (resp.ok) {
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `harness_report_${new Date().toISOString().slice(0,10)}.zip`;
        a.click();
        URL.revokeObjectURL(url);
      }
    } catch (e) { console.error('Download failed', e); }
    setGenerating(false);
  };

  const downloadSummaryPng = async () => {
    const w = 1200, h = 800;
    const offscreen = document.createElement('canvas');
    offscreen.width = w;
    offscreen.height = h;
    const ctx = offscreen.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#76b900';
    ctx.fillRect(0, 0, w, 60);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px Inter, sans-serif';
    ctx.fillText(reportTitle, 24, 40);

    const now = new Date().toLocaleString();
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = '#ffffffcc';
    ctx.fillText(`Generated: ${now}`, w - 260, 40);

    let y = 80;
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.fillText('Filters', 24, y);
    y += 24;
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = '#555';
    const filters = [];
    if (filterDataset) filters.push(`Dataset: ${filterDataset}`);
    if (filterPreset) filters.push(`Preset: ${filterPreset}`);
    if (filterStatus !== 'all') filters.push(`Status: ${filterStatus}`);
    if (dateFrom) filters.push(`From: ${dateFrom}`);
    if (dateTo) filters.push(`To: ${dateTo}`);
    ctx.fillText(filters.length > 0 ? filters.join('  |  ') : 'None (all runs)', 24, y);
    y += 30;

    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.fillText(`Summary (${filteredRuns.length} runs)`, 24, y);
    y += 8;

    const metricCols = ANALYTICS_METRICS.filter(m => summaryStats[m.key]);
    const colW = Math.min(160, (w - 48) / metricCols.length);
    metricCols.forEach((m, i) => {
      const s = summaryStats[m.key];
      const x = 24 + i * colW;
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x, y, colW - 8, 64);
      ctx.fillStyle = '#76b900';
      ctx.font = 'bold 14px Inter, sans-serif';
      ctx.fillText(s.avg.toFixed(2), x + 8, y + 24);
      ctx.fillStyle = '#888';
      ctx.font = '10px Inter, sans-serif';
      ctx.fillText(`min ${s.min.toFixed(2)} / max ${s.max.toFixed(2)}`, x + 8, y + 42);
      ctx.fillStyle = '#333';
      ctx.font = '11px Inter, sans-serif';
      ctx.fillText(m.label, x + 8, y + 58);
    });
    y += 80;

    if (previewImages.length > 0) {
      const chartW = (w - 48 - 16) / 2;
      const chartH = Math.min(250, (h - y - 40) / Math.ceil(previewImages.length / 2));
      for (let i = 0; i < previewImages.length; i++) {
        const col = i % 2;
        const row = Math.floor(i / 2);
        const px = 24 + col * (chartW + 16);
        const py = y + row * (chartH + 12);
        if (py + chartH > h - 10) break;
        const img = new Image();
        img.src = previewImages[i].dataUrl;
        await new Promise(r => { img.onload = r; img.onerror = r; });
        ctx.drawImage(img, px, py, chartW, chartH);
      }
    }

    const dataUrl = offscreen.toDataURL('image/png', 1);
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `harness_summary_${new Date().toISOString().slice(0,10)}.png`;
    a.click();
  };

  const labelStyle = {display:'block',fontSize:'10px',fontWeight:600,color:'var(--nv-text-dim)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.05em'};

  return (
    <>
      {/* Report Configuration */}
      <div className="card" style={{padding:'20px',marginBottom:'20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <h3 style={{margin:0,fontSize:'16px',fontWeight:600}}>Report Configuration</h3>
        </div>

        <div style={{marginBottom:'16px'}}>
          <div style={labelStyle}>Report Title</div>
          <input className="input" value={reportTitle} onChange={e=>setReportTitle(e.target.value)}
            style={{maxWidth:'400px'}} placeholder="Enter report title" />
        </div>

        <div style={{display:'flex',gap:'16px',alignItems:'flex-end',flexWrap:'wrap',marginBottom:'16px'}}>
          <div>
            <div style={labelStyle}>Dataset</div>
            <select className="select" value={filterDataset} onChange={e=>setFilterDataset(e.target.value)} style={{minWidth:'140px'}}>
              <option value="">All Datasets</option>
              {allDatasets.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <div style={labelStyle}>Preset</div>
            <select className="select" value={filterPreset} onChange={e=>setFilterPreset(e.target.value)} style={{minWidth:'130px'}}>
              <option value="">All Presets</option>
              {allPresets.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <div style={labelStyle}>Status</div>
            <select className="select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{minWidth:'100px'}}>
              <option value="all">All</option>
              <option value="pass">Pass only</option>
              <option value="fail">Fail only</option>
            </select>
          </div>
          <div>
            <div style={labelStyle}>From</div>
            <input type="date" className="input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{minWidth:'140px',colorScheme:'dark'}} />
          </div>
          <div>
            <div style={labelStyle}>To</div>
            <input type="date" className="input" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{minWidth:'140px',colorScheme:'dark'}} />
          </div>
        </div>

        <div style={{marginBottom:'16px'}}>
          <div style={labelStyle}>Charts to Include</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
            {REPORT_CHARTS.map(c => (
              <label key={c.id} style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'var(--nv-text-muted)',
                cursor:'pointer',padding:'6px 12px',borderRadius:'6px',border:'1px solid var(--nv-border)',
                background:selectedCharts.includes(c.id)?'rgba(118,185,0,0.1)':'transparent'}}>
                <input type="checkbox" checked={selectedCharts.includes(c.id)} onChange={()=>toggleChart(c.id)}
                  style={{accentColor:'var(--nv-green)'}} />
                {c.label}
              </label>
            ))}
          </div>
        </div>

        <div style={{display:'flex',gap:'8px',borderTop:'1px solid var(--nv-border)',paddingTop:'16px'}}>
          <button className="btn btn-primary" onClick={generatePreview} disabled={previewing || activeCharts.length === 0 || filteredRuns.length === 0}>
            {previewing ? <><div className="spinner" style={{width:14,height:14}}></div> Generating…</> : <><IconChart /> Generate Preview</>}
          </button>
          <button className="btn btn-ghost" onClick={downloadSummaryPng} disabled={previewImages.length === 0}>
            <IconDownload /> Summary PNG
          </button>
          <button className="btn btn-ghost" onClick={downloadAllPngs} disabled={previewImages.length === 0 || generating}>
            {generating ? <><div className="spinner" style={{width:14,height:14}}></div> Packaging…</> : <><IconDownload /> Download All (ZIP)</>}
          </button>
        </div>
      </div>

      {/* Summary Stats */}
      <div className="card" style={{padding:'16px 20px',marginBottom:'20px'}}>
        <h3 style={{margin:'0 0 12px 0',fontSize:'14px',fontWeight:600,color:'var(--nv-text-muted)'}}>
          Report Summary — {filteredRuns.length} runs
        </h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(150px, 1fr))',gap:'10px'}}>
          {ANALYTICS_METRICS.map(m => {
            const s = summaryStats[m.key];
            if (!s) return (
              <div key={m.key} className="metric-card" style={{opacity:0.5}}>
                <div className="metric-value" style={{fontSize:'16px'}}>—</div>
                <div className="metric-label">{m.label}</div>
              </div>
            );
            return (
              <div key={m.key} className="metric-card">
                <div className="metric-value" style={{fontSize:'18px'}}>{s.avg.toFixed(2)}</div>
                <div className="metric-label">{m.label} (avg)</div>
                <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'4px'}}>
                  min {s.min.toFixed(2)} · max {s.max.toFixed(2)} · {s.count} pts
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* GPU Performance Comparison Table */}
      {(() => {
        const gpuRows = {};
        filteredRuns.forEach(r => {
          const gpu = r.gpu_type || "Unknown GPU";
          const ds = r.dataset || "unknown";
          const key = `${gpu}|||${ds}`;
          if (!gpuRows[key]) gpuRows[key] = { gpu, dataset: ds, pps: [], recall1: [], recall5: [], recall10: [], ingest: [], count: 0 };
          gpuRows[key].count++;
          if (r.pages_per_sec != null) gpuRows[key].pps.push(r.pages_per_sec);
          if (r.recall_1 != null) gpuRows[key].recall1.push(r.recall_1);
          if (r.recall_5 != null) gpuRows[key].recall5.push(r.recall_5);
          if (r.recall_10 != null) gpuRows[key].recall10.push(r.recall_10);
          if (r.ingest_secs != null) gpuRows[key].ingest.push(r.ingest_secs);
        });
        const rows = Object.values(gpuRows).sort((a, b) => a.gpu.localeCompare(b.gpu) || a.dataset.localeCompare(b.dataset));
        const avg = arr => arr.length ? (arr.reduce((s,v) => s+v, 0) / arr.length) : null;
        const fmtN = (v, d=2) => v != null ? v.toFixed(d) : "\u2014";
        if (rows.length === 0) return null;
        const bestPps = {};
        rows.forEach(r => {
          const a = avg(r.pps);
          if (a != null && (!bestPps[r.dataset] || a > bestPps[r.dataset])) bestPps[r.dataset] = a;
        });
        return (
          <div className="card" style={{padding:'16px 20px',marginBottom:'20px'}}>
            <h3 style={{margin:'0 0 12px 0',fontSize:'14px',fontWeight:600,color:'var(--nv-text-muted)'}}>
              GPU Performance Comparison by Dataset
            </h3>
            <div style={{overflowX:'auto'}}>
              <table className="runs-table" style={{fontSize:'12px'}}>
                <thead>
                  <tr>
                    <th>GPU SKU</th><th>Dataset</th><th style={{textAlign:'right'}}>Runs</th>
                    <th style={{textAlign:'right'}}>Avg PPS</th><th style={{textAlign:'right'}}>Best PPS</th>
                    <th style={{textAlign:'right'}}>Recall@1</th><th style={{textAlign:'right'}}>Recall@5</th>
                    <th style={{textAlign:'right'}}>Recall@10</th><th style={{textAlign:'right'}}>Avg Ingest (s)</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r, i) => {
                    const avgPps = avg(r.pps);
                    const isBest = avgPps != null && bestPps[r.dataset] === avgPps;
                    return (
                      <tr key={i} style={{background: isBest ? 'rgba(118,185,0,0.04)' : 'transparent'}}>
                        <td style={{fontWeight:500,color:'#fff',whiteSpace:'nowrap'}}>{r.gpu}</td>
                        <td><span className="tag">{r.dataset}</span></td>
                        <td style={{textAlign:'right'}}>{r.count}</td>
                        <td style={{textAlign:'right',fontWeight:600,color:isBest?'var(--nv-green)':'#fff'}}>
                          {fmtN(avgPps)}
                          {isBest && <span style={{marginLeft:'6px',fontSize:'10px',color:'var(--nv-green)'}}>BEST</span>}
                        </td>
                        <td style={{textAlign:'right',color:'var(--nv-text-muted)'}}>{fmtN(r.pps.length ? Math.max(...r.pps) : null)}</td>
                        <td style={{textAlign:'right'}}>{fmtN(avg(r.recall1))}</td>
                        <td style={{textAlign:'right'}}>{fmtN(avg(r.recall5))}</td>
                        <td style={{textAlign:'right'}}>{fmtN(avg(r.recall10))}</td>
                        <td style={{textAlign:'right',color:'var(--nv-text-muted)'}}>{fmtN(avg(r.ingest))}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}

      {/* Data Export */}
      <DataExportSection filteredRuns={filteredRuns} filterDataset={filterDataset} filterPreset={filterPreset}
        filterStatus={filterStatus} dateFrom={dateFrom} dateTo={dateTo} />

      {/* Offscreen render area for chart generation */}
      <div style={{position:'absolute',left:'-9999px',top:0,width:'800px'}}>
        {activeCharts.map(c => (
          <div key={c.id} style={{width:'800px',height:'400px',background:'#fff'}}>
            <canvas ref={el => { canvasRefs.current[c.id] = el; }} width={800} height={400}></canvas>
          </div>
        ))}
      </div>

      {/* Preview */}
      {previewImages.length > 0 && (
        <div style={{marginBottom:'20px'}}>
          <h3 style={{fontSize:'16px',fontWeight:600,marginBottom:'12px'}}>Preview</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(380px, 1fr))',gap:'16px'}}>
            {previewImages.map(img => (
              <div key={img.id} className="card" style={{padding:'12px',overflow:'hidden'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                  <span style={{fontSize:'13px',fontWeight:600,color:'var(--nv-text-muted)'}}>{img.label}</span>
                  <button className="btn btn-ghost btn-sm" onClick={()=>downloadSinglePng(img)} title="Download PNG">
                    <IconDownload />
                  </button>
                </div>
                <img src={img.dataUrl} alt={img.label} style={{width:'100%',borderRadius:'6px',background:'#fff'}} />
              </div>
            ))}
          </div>
        </div>
      )}

      {filteredRuns.length === 0 && !loading && (
        <div className="card" style={{padding:'40px',textAlign:'center'}}>
          <div style={{color:'var(--nv-text-muted)',fontSize:'15px'}}>No runs match the current filters</div>
          <div style={{color:'var(--nv-text-dim)',fontSize:'12px',marginTop:'8px'}}>Adjust filters or trigger some runs first.</div>
        </div>
      )}
    </>
  );
}

/* ===== Log Viewer Modal ===== */
function LogViewerModal({ jobId, onClose }) {
  const [logData, setLogData] = useState({ log_tail: [], status: null });
  const [autoScroll, setAutoScroll] = useState(true);
  const logRef = useRef(null);

  const fetchLogs = useCallback(async () => {
    if (!jobId) return;
    try {
      const resp = await fetch(`/api/jobs/${jobId}/logs`);
      if (resp.ok) {
        const data = await resp.json();
        setLogData(data);
      }
    } catch (e) { console.error(e); }
  }, [jobId]);

  useEffect(() => { fetchLogs(); }, [fetchLogs]);

  useEffect(() => {
    const isActive = logData.status === "running" || logData.status === "cancelling";
    if (!isActive) return;
    const iv = setInterval(fetchLogs, 3000);
    return () => clearInterval(iv);
  }, [fetchLogs, logData.status]);

  useEffect(() => {
    if (autoScroll && logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [logData.log_tail, autoScroll]);

  const handleCancel = async () => {
    if (!confirm("Cancel this job?")) return;
    try {
      await fetch(`/api/jobs/${jobId}/cancel`, { method: "POST" });
      fetchLogs();
    } catch (e) { console.error(e); }
  };

  const isActive = logData.status === "running" || logData.status === "cancelling";
  const lines = logData.log_tail || [];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'900px'}} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <h2 style={{margin:0,fontSize:'16px',color:'#fff'}}>Job Logs</h2>
            <span className="mono" style={{fontSize:'12px',color:'var(--nv-text-dim)'}}>{jobId}</span>
            {logData.status && <JobStatusBadge status={logData.status} />}
            {isActive && <span className="spinner"></span>}
          </div>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <div className="modal-body" style={{padding:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
            <span style={{fontSize:'12px',color:'var(--nv-text-muted)'}}>{lines.length} line{lines.length!==1?'s':''}</span>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'12px',color:'var(--nv-text-muted)',cursor:'pointer'}}>
                <input type="checkbox" checked={autoScroll} onChange={e => setAutoScroll(e.target.checked)} /> Auto-scroll
              </label>
              <button className="btn btn-secondary" style={{fontSize:'11px',padding:'3px 8px'}} onClick={fetchLogs}>
                <IconRefresh /> Refresh
              </button>
            </div>
          </div>
          <div className="log-viewer" ref={logRef}>
            {lines.length === 0 ? (
              <div style={{color:'var(--nv-text-dim)',fontStyle:'italic'}}>
                {isActive ? "Waiting for log output..." : "No log output available."}
              </div>
            ) : (
              lines.map((line, i) => <div key={i} className="log-line">{line}</div>)
            )}
          </div>
        </div>
        <div className="modal-foot">
          {(logData.status === "running" || logData.status === "pending") && (
            <button className="btn" style={{background:'rgba(255,80,80,0.12)',color:'#ff5050',border:'1px solid rgba(255,80,80,0.2)'}}
              onClick={handleCancel}><IconStop /> Cancel Job</button>
          )}
          <button className="btn btn-secondary" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ===== Trigger Modal ===== */
function TriggerModal({ onClose, onTriggered }) {
  const [datasets, setDatasets] = useState([]);
  const [presets, setPresets] = useState([]);
  const [runners, setRunners] = useState([]);
  const [dataset, setDataset] = useState("");
  const [preset, setPreset] = useState("");
  const [runnerId, setRunnerId] = useState("");
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    fetch("/api/config").then(r=>r.json()).then(cfg => {
      setDatasets(cfg.datasets || []);
      setPresets(cfg.presets || []);
      if (cfg.datasets?.length) setDataset(cfg.datasets[0]);
      if (cfg.presets?.length) setPreset(cfg.presets[0]);
    });
    fetch("/api/runners").then(r=>r.json()).then(setRunners).catch(()=>{});
  }, []);

  const onlineRunners = runners.filter(r => r.status === "online" || r.status === "paused");

  async function handleSubmit(e) {
    e.preventDefault();
    if (!dataset) return;
    setSubmitting(true);
    try {
      const payload = { dataset, preset: preset || null, runner_id: runnerId ? parseInt(runnerId, 10) : null };
      const res = await fetch("/api/runs/trigger", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      onTriggered(data);
      onClose();
    } catch (err) {
      alert("Failed to trigger run: " + err.message);
    } finally {
      setSubmitting(false);
    }
  }

  const labelStyle = {display:'block',fontSize:'12px',fontWeight:500,color:'var(--nv-text-muted)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.04em'};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'460px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>Trigger New Run</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px'}}>
            <div>
              <label style={labelStyle}>Dataset</label>
              <select value={dataset} onChange={e=>setDataset(e.target.value)} className="select" style={{width:'100%'}}>
                {datasets.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Preset</label>
              <select value={preset} onChange={e=>setPreset(e.target.value)} className="select" style={{width:'100%'}}>
                {presets.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Runner</label>
              <select value={runnerId} onChange={e=>setRunnerId(e.target.value)} className="select" style={{width:'100%'}}>
                <option value="">Any available runner</option>
                {onlineRunners.map(r=><option key={r.id} value={r.id}>{r.name} ({r.hostname || 'unknown'}) — {r.gpu_type || 'no GPU'} x{r.gpu_count||0}{r.status==='paused'?' [PAUSED]':''}</option>)}
              </select>
              <div style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'4px'}}>
                {onlineRunners.length === 0
                  ? "No runners online. The job will wait until a runner becomes available."
                  : `${onlineRunners.length} runner${onlineRunners.length!==1?'s':''} online`}
              </div>
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" disabled={submitting||!dataset} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
              {submitting ? <><span className="spinner" style={{marginRight:'8px'}}></span>Triggering…</> : "Start Run"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ===== Ingestion Playground View ===== */
function IngestionView({ jobs, onViewLogs }) {
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadResult, setUploadResult] = useState(null);
  const [presets, setPresets] = useState([]);
  const [runners, setRunners] = useState([]);
  const [preset, setPreset] = useState("");
  const [runnerId, setRunnerId] = useState("");
  const [inputType, setInputType] = useState("pdf");
  const [triggering, setTriggering] = useState(false);
  const [triggered, setTriggered] = useState(null);
  const [error, setError] = useState("");
  const [sessions, setSessions] = useState([]);
  const [sessionsLoading, setSessionsLoading] = useState(true);

  useEffect(() => {
    fetch("/api/config").then(r => r.json()).then(cfg => {
      setPresets(cfg.presets || []);
      if (cfg.presets?.length) setPreset(cfg.presets[0]);
    }).catch(() => {});
    fetch("/api/runners").then(r => r.json()).then(setRunners).catch(() => {});
    fetchSessions();
  }, []);

  async function fetchSessions() {
    setSessionsLoading(true);
    try {
      const res = await fetch("/api/playground/sessions");
      setSessions(await res.json());
    } catch {} finally { setSessionsLoading(false); }
  }

  function handleFileChange(e) {
    setFiles(Array.from(e.target.files || []));
    setUploadResult(null);
    setTriggered(null);
    setError("");
  }

  function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    const dropped = Array.from(e.dataTransfer.files || []);
    if (dropped.length) {
      setFiles(dropped);
      setUploadResult(null);
      setTriggered(null);
      setError("");
    }
  }

  async function handleUpload() {
    if (files.length === 0) return;
    setUploading(true);
    setError("");
    setTriggered(null);
    try {
      const fd = new FormData();
      files.forEach(f => fd.append("files", f));
      const res = await fetch("/api/playground/upload", { method: "POST", body: fd });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || `HTTP ${res.status}`);
      }
      const result = await res.json();
      setUploadResult(result);
      fetchSessions();
    } catch (err) {
      setError(err.message);
    } finally {
      setUploading(false);
    }
  }

  async function handleTrigger() {
    if (!uploadResult) return;
    setTriggering(true);
    setError("");
    try {
      const payload = {
        session_id: uploadResult.session_id,
        preset: preset || null,
        runner_id: runnerId ? parseInt(runnerId, 10) : null,
        input_type: inputType,
      };
      const res = await fetch("/api/playground/ingest", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || `HTTP ${res.status}`);
      }
      setTriggered(await res.json());
    } catch (err) {
      setError(err.message);
    } finally {
      setTriggering(false);
    }
  }

  async function handleDeleteSession(sessionId) {
    if (!confirm("Delete this upload session and its files?")) return;
    try {
      await fetch(`/api/playground/sessions/${sessionId}`, { method: "DELETE" });
      fetchSessions();
      if (uploadResult && uploadResult.session_id === sessionId) {
        setUploadResult(null);
        setTriggered(null);
      }
    } catch {}
  }

  function formatBytes(b) {
    if (b < 1024) return b + " B";
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
    return (b / (1024 * 1024)).toFixed(1) + " MB";
  }

  const onlineRunners = runners.filter(r => r.status === "online" || r.status === "paused");
  const playgroundJobs = (jobs || []).filter(j => j.trigger_source === "playground" && (j.status === "running" || j.status === "pending" || j.status === "cancelling"));
  const labelStyle = {display:'block',fontSize:'11px',fontWeight:600,color:'var(--nv-text-dim)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'6px'};

  return (
    <>
      {/* Active playground jobs */}
      {playgroundJobs.length > 0 && (
        <div style={{marginBottom:'20px'}}>
          <div className="section-title" style={{marginBottom:'8px'}}>Active Ingestion Jobs</div>
          <div className="card" style={{padding:'0'}}>
            {playgroundJobs.map(j => (
              <div key={j.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--nv-border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <JobStatusBadge status={j.status} />
                  {(j.status==="running" || j.status==="cancelling") && <span className="spinner"></span>}
                  <span style={{color:'#fff',fontWeight:500,fontSize:'13px'}}>{j.dataset}</span>
                  {j.preset && <span style={{color:'var(--nv-text-muted)',fontSize:'12px'}}>{j.preset}</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  {(j.status==="running" || j.status==="cancelling") && onViewLogs && (
                    <button className="btn btn-secondary" style={{fontSize:'11px',padding:'3px 8px'}}
                      onClick={() => onViewLogs(j.id)} title="View Logs">
                      <IconTerminal /> Logs
                    </button>
                  )}
                  <span className="mono" style={{fontSize:'11px',color:'var(--nv-text-dim)'}}>{j.id}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'20px'}}>
        {/* Upload Card */}
        <div className="card" style={{padding:'24px'}}>
          <div className="section-title" style={{marginBottom:'14px'}}>Upload Documents</div>
          <div
            onDragOver={e => { e.preventDefault(); e.stopPropagation(); }}
            onDrop={handleDrop}
            style={{
              border:'2px dashed var(--nv-border)',borderRadius:'12px',padding:'32px 20px',
              textAlign:'center',cursor:'pointer',transition:'border-color 0.2s',
              background:'rgba(255,255,255,0.02)',marginBottom:'16px',
            }}
            onClick={() => document.getElementById('pg-file-input')?.click()}
            onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--nv-green)'}
            onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--nv-border)'}
          >
            <input type="file" id="pg-file-input" multiple style={{display:'none'}} onChange={handleFileChange}
              accept=".pdf,.txt,.html,.doc,.docx,.pptx,.png,.jpg,.jpeg,.bmp,.tiff,.svg" />
            <div style={{fontSize:'36px',marginBottom:'10px',opacity:0.3}}><IconUpload /></div>
            <div style={{fontSize:'14px',color:'var(--nv-text-muted)',fontWeight:500}}>
              {files.length > 0
                ? `${files.length} file${files.length !== 1 ? 's' : ''} selected (${formatBytes(files.reduce((s,f) => s+f.size, 0))})`
                : "Drop files here or click to browse"}
            </div>
            <div style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'6px'}}>
              PDF, TXT, HTML, DOC, DOCX, PPTX, Images
            </div>
          </div>

          {files.length > 0 && (
            <div style={{marginBottom:'16px',maxHeight:'120px',overflowY:'auto',fontSize:'12px'}}>
              {files.map((f, i) => (

            </div>

        {/* Run Configuration Card */}
        <div className="card" style={{padding:'24px'}}>
          <div className="section-title" style={{marginBottom:'14px'}}>Run Configuration</div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div>
              <label style={labelStyle}>Input Type</label>
              <select className="select" style={{width:'100%'}} value={inputType} onChange={e => setInputType(e.target.value)}>

                <option value="image">Image</option>

            <div>

            <button className="btn btn-primary" onClick={handleTrigger}

            </button>

              <div style={{fontSize:'12px',color:'var(--nv-text-dim)',textAlign:'center',fontStyle:'italic'}}>

      {/* Error */}

        <div style={{marginBottom:'16px',padding:'12px 16px',borderRadius:'8px',background:'rgba(255,50,50,0.08)',border:'1px solid rgba(255,50,50,0.2)',color:'#ff5050',fontSize:'13px'}}>

                          setError("");

                        <button className="btn btn-sm" onClick={() => handleDeleteSession(s.session_id)}

}

/* ===== Models Playground View ===== */
function ModelsView() {
  const [models, setModels] = useState([]);
  const [modelsLoading, setModelsLoading] = useState(true);
  const [selectedModel, setSelectedModel] = useState(null);
  const [activeTab, setActiveTab] = useState("embed");

  const [embedTexts, setEmbedTexts] = useState("What is machine learning?");
  const [embedPrefix, setEmbedPrefix] = useState("query: ");
  const [embedResult, setEmbedResult] = useState(null);
  const [embedLoading, setEmbedLoading] = useState(false);
  const [embedError, setEmbedError] = useState(null);

  const [rerankQuery, setRerankQuery] = useState("What is machine learning?");
  const [rerankDocs, setRerankDocs] = useState("Machine learning is a subset of artificial intelligence that enables systems to learn from data.\nParis is the capital of France and is known for the Eiffel Tower.\nDeep learning uses neural networks with many layers to model complex patterns.");
  const [rerankResult, setRerankResult] = useState(null);
  const [rerankLoading, setRerankLoading] = useState(false);
  const [rerankError, setRerankError] = useState(null);

  const [imageB64, setImageB64] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [ocrMerge, setOcrMerge] = useState("paragraph");
  const [detectThreshold, setDetectThreshold] = useState(0.25);
  const [visionResult, setVisionResult] = useState(null);
  const [visionLoading, setVisionLoading] = useState(false);
  const [visionError, setVisionError] = useState(null);

  useEffect(() => {
    fetch("/api/models").then(r => r.json()).then(data => {
      setModels(data);
      if (data.length > 0) {
        const embedModel = data.find(m => m.type === "embedding");
        if (embedModel) setSelectedModel(embedModel.id);
      }
    }).catch(() => {}).finally(() => setModelsLoading(false));
  }, []);

  const embedModels = models.filter(m => m.type === "embedding");
  const rerankModels = models.filter(m => m.type === "reranker");
  const visionModels = models.filter(m => m.input_type === "image");

  function handleImageUpload(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setImageB64(ev.target.result);
      setImagePreview(ev.target.result);
      setVisionResult(null); setVisionError(null);
    };
    reader.readAsDataURL(file);
  }

  function selectTab(model) {
    setSelectedModel(model.id);
    if (model.type === "reranker") setActiveTab("rerank");
    else if (model.input_type === "image") setActiveTab("vision");
    else setActiveTab("embed");
  }

  async function runEmbed() {
    const texts = embedTexts.split("\n").map(t => t.trim()).filter(Boolean);
    if (texts.length === 0) return;
    const modelId = selectedModel || (embedModels[0] && embedModels[0].id);
    if (!modelId) return;
    setEmbedLoading(true); setEmbedError(null); setEmbedResult(null);
    try {
      const res = await fetch("/api/models/embed", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ model_id: modelId, texts, prefix: embedPrefix }),
      });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || `HTTP ${res.status}`); }
      setEmbedResult(await res.json());
    } catch (err) { setEmbedError(err.message); } finally { setEmbedLoading(false); }
  }

  async function runRerank() {
    const docs = rerankDocs.split("\n").map(t => t.trim()).filter(Boolean);
    if (!rerankQuery.trim() || docs.length === 0) return;
    const modelId = rerankModels.length > 0 ? rerankModels[0].id : "nvidia/llama-nemotron-rerank-1b-v2";
    setRerankLoading(true); setRerankError(null); setRerankResult(null);
    try {
      const res = await fetch("/api/models/rerank", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ model_id: modelId, query: rerankQuery.trim(), documents: docs }),
      });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || `HTTP ${res.status}`); }
      setRerankResult(await res.json());
    } catch (err) { setRerankError(err.message); } finally { setRerankLoading(false); }
  }

  async function runVision() {
    if (!imageB64 || !selectedModel) return;
    const model = models.find(m => m.id === selectedModel);
    if (!model || model.input_type !== "image") return;
    setVisionLoading(true); setVisionError(null); setVisionResult(null);
    const endpoint = model.type === "ocr" ? "/api/models/ocr"
      : model.type === "document-parser" ? "/api/models/parse"
      : model.type === "object-detection" ? "/api/models/detect"
      : null;
    if (!endpoint) { setVisionError(`No test endpoint for model type: ${model.type}`); setVisionLoading(false); return; }
    try {
      const payload = { model_id: selectedModel, image_b64: imageB64 };
      if (model.type === "ocr") payload.merge_level = ocrMerge;
      if (model.type === "object-detection") payload.score_threshold = detectThreshold;
      const res = await fetch(endpoint, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || `HTTP ${res.status}`); }
      setVisionResult(await res.json());
    } catch (err) { setVisionError(err.message); } finally { setVisionLoading(false); }
  }

  const labelStyle = {display:'block',fontSize:'11px',fontWeight:600,color:'var(--nv-text-dim)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'6px'};
  const tabStyle = (active) => ({
    padding:'8px 20px',fontSize:'13px',fontWeight:active?600:400,cursor:'pointer',
    borderBottom:active?'2px solid var(--nv-green)':'2px solid transparent',
    color:active?'var(--nv-green)':'var(--nv-text-muted)',background:'transparent',border:'none',borderBottomWidth:'2px',borderBottomStyle:'solid',
    transition:'all 0.15s',
  });
  const TYPE_COLORS = { embedding:'#76b900', reranker:'#bb86fc', ocr:'#64b4ff', 'object-detection':'#fcd34d', 'document-parser':'#ff8c00', asr:'#00d4aa' };

  function scoreColor(score) {
    if (score > 10) return '#76b900';
    if (score > 0) return '#8bc34a';
    if (score > -10) return '#ff8c00';
    return '#ff5050';
  }

  if (modelsLoading) {
    return <div style={{textAlign:'center',padding:'60px'}}><div className="spinner spinner-lg" style={{margin:'0 auto 12px'}}></div><div style={{color:'var(--nv-text-muted)'}}>Loading models…</div></div>;
  }

  const categories = [...new Set(models.map(m => m.category || "Other"))];

  return (
    <>
      {/* Model cards grouped by category */}
      {categories.map(cat => (
        <div key={cat} style={{marginBottom:'24px'}}>
          <div style={{fontSize:'12px',fontWeight:700,color:'var(--nv-text-dim)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'10px',paddingLeft:'2px'}}>{cat}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'12px'}}>
            {models.filter(m => (m.category || "Other") === cat).map(m => {
              const tc = TYPE_COLORS[m.type] || '#aaa';
              return (
                <div key={m.id} className="card" style={{padding:'14px',cursor:'pointer',
                  border: selectedModel === m.id ? `1px solid ${tc}` : '1px solid var(--nv-border)',
                  background: selectedModel === m.id ? `${tc}08` : 'var(--nv-surface)',
                }} onClick={() => selectTab(m)}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
                    <IconCpu />
                    <span style={{fontSize:'13px',fontWeight:600,color:'#fff'}}>{m.name}</span>
                  </div>
                  <div style={{fontSize:'11px',color:'var(--nv-text-muted)',marginBottom:'8px',lineHeight:'1.5'}}>{m.description}</div>
                  <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                    <span style={{fontSize:'10px',padding:'2px 8px',borderRadius:'4px',fontWeight:600,textTransform:'uppercase',
                      background:`${tc}18`,color:tc,border:`1px solid ${tc}30`}}>{m.type}</span>
                    {m.input_type && <span style={{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',background:'rgba(255,255,255,0.04)',color:'var(--nv-text-dim)'}}>{m.input_type}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Tab bar */}
      <div style={{display:'flex',borderBottom:'1px solid var(--nv-border)',marginBottom:'20px',flexWrap:'wrap'}}>
        <button style={tabStyle(activeTab==='embed')} onClick={()=>setActiveTab('embed')}>Embedding</button>
        <button style={tabStyle(activeTab==='rerank')} onClick={()=>setActiveTab('rerank')}>Reranker</button>
        <button style={tabStyle(activeTab==='vision')} onClick={()=>setActiveTab('vision')}>Document AI</button>
      </div>

      {/* Embedding test panel */}
      {activeTab === 'embed' && (
        <div className="card" style={{padding:'24px'}}>
          <div style={{fontSize:'15px',fontWeight:600,color:'#fff',marginBottom:'16px'}}>Embedding Model Test</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
            <div>
              <label style={labelStyle}>Model</label>
              <select className="select" style={{width:'100%'}} value={selectedModel || ''} onChange={e=>setSelectedModel(e.target.value)}>
                {embedModels.map(m => <option key={m.id} value={m.id}>{m.name} ({m.id})</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Query Prefix</label>
              <input className="input" style={{width:'100%'}} value={embedPrefix} onChange={e=>setEmbedPrefix(e.target.value)} placeholder="query: " />
              <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'4px'}}>Use "query: " for queries, "passage: " for documents.</div>
            </div>
          </div>
          <div style={{marginBottom:'16px'}}>
            <label style={labelStyle}>Input Texts (one per line)</label>
            <textarea className="input" rows={5} style={{width:'100%',fontFamily:'var(--font-mono)',fontSize:'12px',resize:'vertical'}}
              value={embedTexts} onChange={e=>setEmbedTexts(e.target.value)} placeholder={"Enter one or more texts, each on its own line…"} />
          </div>
          <button className="btn btn-primary" onClick={runEmbed} disabled={embedLoading || !embedTexts.trim()}>
            {embedLoading ? <><span className="spinner" style={{marginRight:'8px'}}></span>Embedding…</> : 'Run Embedding'}
          </button>
          {embedError && <div style={{marginTop:'16px',padding:'12px 16px',borderRadius:'6px',background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.2)',color:'#ff5050',fontSize:'13px'}}>{embedError}</div>}
          {embedResult && (
            <div style={{marginTop:'20px'}}>
              <div style={{display:'flex',gap:'16px',flexWrap:'wrap',marginBottom:'16px'}}>
                {[{label:'Model',value:embedResult.model_id},{label:'Vectors',value:embedResult.count},{label:'Dimensions',value:embedResult.embedding_dim},{label:'Load Time',value:`${embedResult.model_load_ms}ms`},{label:'Embed Time',value:`${embedResult.embed_ms}ms`}].map(s => (
                  <div key={s.label} style={{background:'rgba(118,185,0,0.06)',border:'1px solid rgba(118,185,0,0.12)',borderRadius:'6px',padding:'8px 14px',minWidth:'100px'}}>
                    <div style={{fontSize:'10px',color:'var(--nv-text-dim)',textTransform:'uppercase',fontWeight:600,marginBottom:'2px'}}>{s.label}</div>
                    <div className="mono" style={{fontSize:'13px',color:'var(--nv-green)',fontWeight:600}}>{s.value}</div>
                  </div>
                ))}
              </div>
              <table className="runs-table" style={{fontSize:'12px'}}>
                <thead><tr><th>#</th><th>Text</th><th>Dim</th><th>Norm</th><th>Vector Preview</th></tr></thead>
                <tbody>
                  {embedResult.results.map((r, i) => (
                    <tr key={i}>
                      <td>{i+1}</td>
                      <td style={{maxWidth:'300px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.text}</td>
                      <td className="mono">{r.embedding_dim}</td>
                      <td className="mono">{r.embedding_norm}</td>
                      <td className="mono" style={{fontSize:'10px',color:'var(--nv-text-dim)',maxWidth:'300px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        [{r.embedding_preview.map(v => v.toFixed(4)).join(', ')}, …]
