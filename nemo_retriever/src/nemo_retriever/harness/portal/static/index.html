                  <td style={{color:'var(--nv-text-muted)',fontSize:'12px',whiteSpace:'nowrap'}}>{fmtTs(s.last_triggered_at)}</td>
                  <td>
                    <div style={{display:'flex',gap:'6px',flexWrap:'nowrap'}}>
                      <button className="btn btn-secondary btn-sm" onClick={()=>handleTriggerNow(s.id)} title="Trigger Now"><IconPlay /> Run</button>
                      <button className="btn btn-secondary btn-sm" onClick={()=>handleEdit(s)} title="Edit"><IconEdit /> Edit</button>
                      <button className="btn btn-sm" onClick={()=>handleDelete(s.id,s.name)} title="Delete" style={{background:'rgba(255,80,80,0.1)',color:'#ff5050',border:'1px solid rgba(255,80,80,0.2)'}}><IconTrash /> Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <Pagination page={pg.page} totalPages={pg.totalPages} totalItems={pg.totalItems}
          pageSize={pg.pageSize} onPageChange={pg.setPage} onPageSizeChange={pg.setPageSize} />
      </div>
      {showForm && (
        <ScheduleFormModal
          schedule={editSchedule}
          runners={runners}
          onClose={()=>setShowForm(false)}
          onSaved={()=>{setShowForm(false);onRefresh();}}
        />
      )}
    </>
  );
}

/* ===== Schedule Form Modal ===== */
function ScheduleFormModal({ schedule, runners, onClose, onSaved }) {
  const isEdit = !!schedule;
  const [datasets, setDatasets] = useState([]);
  const [presets, setPresets] = useState([]);
  const [form, setForm] = useState({
    name: schedule?.name || "",
    description: schedule?.description || "",
    dataset: schedule?.dataset || "",
    preset: schedule?.preset || "",
    config: schedule?.config || "",
    trigger_type: schedule?.trigger_type || "cron",
    cron_expression: schedule?.cron_expression || "",
    github_repo: schedule?.github_repo || "",
    github_branch: schedule?.github_branch || "main",
    min_gpu_count: schedule?.min_gpu_count ?? "",
    gpu_type_pattern: schedule?.gpu_type_pattern || "",
    min_cpu_count: schedule?.min_cpu_count ?? "",
    min_memory_gb: schedule?.min_memory_gb ?? "",
    preferred_runner_id: schedule?.preferred_runner_id ?? "",
    enabled: schedule?.enabled ?? true,
    tags: (schedule?.tags || []).join(", "),
  });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    fetch("/api/config").then(r=>r.json()).then(cfg => {
      setDatasets(cfg.datasets || []);
      setPresets(cfg.presets || []);
      if (!form.dataset && cfg.datasets?.length) setForm(f=>({...f, dataset: cfg.datasets[0]}));
    });
  }, []);

  function set(field, val) { setForm(f=>({...f,[field]:val})); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim() || !form.dataset) return;
    setSaving(true);
    try {
      const payload = {
        name: form.name.trim(),
        description: form.description.trim() || null,
        dataset: form.dataset,
        preset: form.preset || null,
        config: form.config.trim() || null,
        trigger_type: form.trigger_type,
        cron_expression: form.trigger_type === "cron" ? form.cron_expression.trim() || null : null,
        github_repo: form.trigger_type === "github_push" ? form.github_repo.trim() || null : null,
        github_branch: form.trigger_type === "github_push" ? form.github_branch.trim() || "main" : null,
        min_gpu_count: form.min_gpu_count !== "" ? parseInt(form.min_gpu_count, 10) : null,
        gpu_type_pattern: form.gpu_type_pattern.trim() || null,
        min_cpu_count: form.min_cpu_count !== "" ? parseInt(form.min_cpu_count, 10) : null,
        min_memory_gb: form.min_memory_gb !== "" ? parseFloat(form.min_memory_gb) : null,
        preferred_runner_id: form.preferred_runner_id !== "" ? parseInt(form.preferred_runner_id, 10) : null,
        enabled: form.enabled,
        tags: form.tags ? form.tags.split(",").map(t=>t.trim()).filter(Boolean) : [],
      };
      const url = isEdit ? `/api/schedules/${schedule.id}` : "/api/schedules";
      const res = await fetch(url, {
        method: isEdit ? "PUT" : "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(await res.text());
      onSaved();
    } catch (err) {
      alert("Failed to save schedule: " + err.message);
    } finally { setSaving(false); }
  }

  const labelStyle = {display:'block',fontSize:'12px',fontWeight:500,color:'var(--nv-text-muted)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.04em'};
  const helpStyle = {fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'4px'};
  const onlineRunners = (runners || []).filter(r => r.status === 'online' || r.status === 'paused');

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'640px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{isEdit ? "Edit Schedule" : "Create Schedule"}</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            {/* Basic Info */}
            <div>
              <label style={labelStyle}>Name *</label>
              <input className="input" style={{width:'100%'}} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Nightly A100 Benchmark" required />
            </div>
            <div>
              <label style={labelStyle}>Description</label>
              <input className="input" style={{width:'100%'}} value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Optional description" />
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
              <div>
                <label style={labelStyle}>Dataset *</label>
                <select className="select" style={{width:'100%'}} value={form.dataset} onChange={e=>set('dataset',e.target.value)}>
                  <option value="">Select dataset…</option>
                  {datasets.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Preset</label>
                <select className="select" style={{width:'100%'}} value={form.preset} onChange={e=>set('preset',e.target.value)}>
                  <option value="">Default</option>
                  {presets.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </div>

            {/* Trigger Type */}
            <div>
              <label style={labelStyle}>Trigger Type</label>
              <div style={{display:'flex',gap:'8px'}}>
                <button type="button" className={`btn ${form.trigger_type==='cron'?'btn-primary':'btn-secondary'}`} style={{flex:1,justifyContent:'center'}}
                  onClick={()=>set('trigger_type','cron')}><IconCalendar /> Cron Schedule</button>
                <button type="button" className={`btn ${form.trigger_type==='github_push'?'btn-primary':'btn-secondary'}`} style={{flex:1,justifyContent:'center'}}
                  onClick={()=>set('trigger_type','github_push')}><IconGithub /> GitHub Push</button>
              </div>
            </div>

            {form.trigger_type === 'cron' && (
              <div>
                <label style={labelStyle}>Cron Expression</label>
                <input className="input mono" style={{width:'100%'}} value={form.cron_expression} onChange={e=>set('cron_expression',e.target.value)} placeholder="0 2 * * *" />
                <div style={helpStyle}>Format: minute hour day month day_of_week — e.g. "0 2 * * *" = daily at 2:00 AM</div>
              </div>
            )}

            {form.trigger_type === 'github_push' && (
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'14px'}}>
                <div>
                  <label style={labelStyle}>GitHub Repository</label>
                  <input className="input" style={{width:'100%'}} value={form.github_repo} onChange={e=>set('github_repo',e.target.value)} placeholder="NVIDIA/nemo-retriever" />
                </div>
                <div>
                  <label style={labelStyle}>Branch</label>
                  <input className="input" style={{width:'100%'}} value={form.github_branch} onChange={e=>set('github_branch',e.target.value)} placeholder="main" />
                </div>
              </div>
            )}

            {/* Runner Requirements */}
            <div style={{borderTop:'1px solid var(--nv-border)',paddingTop:'16px'}}>
              <div style={{...labelStyle,marginBottom:'12px',fontSize:'13px',fontWeight:600}}>Runner Requirements</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'14px'}}>
                <div>
                  <label style={labelStyle}>Min GPUs</label>
                  <input className="input" style={{width:'100%'}} type="number" min="0" value={form.min_gpu_count} onChange={e=>set('min_gpu_count',e.target.value)} placeholder="Any" />
                </div>
                <div>
                  <label style={labelStyle}>GPU Type</label>
                  <input className="input" style={{width:'100%'}} value={form.gpu_type_pattern} onChange={e=>set('gpu_type_pattern',e.target.value)} placeholder="e.g. A100" />
                </div>
                <div>
                  <label style={labelStyle}>Min CPUs</label>
                  <input className="input" style={{width:'100%'}} type="number" min="0" value={form.min_cpu_count} onChange={e=>set('min_cpu_count',e.target.value)} placeholder="Any" />
                </div>
                <div>
                  <label style={labelStyle}>Min Memory (GB)</label>
                  <input className="input" style={{width:'100%'}} type="number" min="0" step="0.1" value={form.min_memory_gb} onChange={e=>set('min_memory_gb',e.target.value)} placeholder="Any" />
                </div>
              </div>
            </div>

            {/* Preferred Runner */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
              <div>
                <label style={labelStyle}>Preferred Runner</label>
                <select className="select" style={{width:'100%'}} value={form.preferred_runner_id} onChange={e=>set('preferred_runner_id',e.target.value)}>
                  <option value="">Auto-select</option>
                  {onlineRunners.map(r=><option key={r.id} value={r.id}>{r.name} ({r.hostname || 'unknown'}){r.status==='paused'?' — paused':''}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Tags (comma-separated)</label>
                <input className="input" style={{width:'100%'}} value={form.tags} onChange={e=>set('tags',e.target.value)} placeholder="e.g. nightly, regression" />
              </div>
            </div>

            {/* Enabled Toggle */}
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <label className="toggle">
                <input type="checkbox" checked={form.enabled} onChange={e=>set('enabled',e.target.checked)} />
                <span className="toggle-slider"></span>
              </label>
              <span style={{fontSize:'14px',color:'var(--nv-text)'}}>Schedule is {form.enabled ? 'enabled' : 'disabled'}</span>
            </div>
          </div>

          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" disabled={saving||!form.name.trim()||!form.dataset} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
              {saving ? <><span className="spinner" style={{marginRight:'8px'}}></span>Saving…</> : isEdit ? "Update Schedule" : "Create Schedule"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ===== Alerts View ===== */
const METRIC_LABELS = { pages_per_sec:"Pages / sec", recall_1:"Recall@1", recall_5:"Recall@5", recall_10:"Recall@10", ingest_secs:"Ingest Time (s)", pages:"Pages", files:"Files", system:"System", runner_status:"Runner Status" };
const OPERATOR_LABELS = { "<":"less than", "<=":"at most", ">":"greater than", ">=":"at least", "==":"equal to", "!=":"not equal to" };

function AlertsView({ alertRules, alertEvents, alertRulesLoading, alertEventsLoading, onRefresh, onSelectRun, githubRepoUrl }) {
  const [tab, setTab] = useState("events");
  const [showForm, setShowForm] = useState(false);
  const [editRule, setEditRule] = useState(null);
  const [filterRule, setFilterRule] = useState("");
  const [filterAck, setFilterAck] = useState("unack");
  const pgRules = usePagination(alertRules, 25);

  function handleCreateRule() { setEditRule(null); setShowForm(true); }
  function handleEditRule(r) { setEditRule(r); setShowForm(true); }
  async function handleDeleteRule(id, name) {
    if (!confirm(`Delete alert rule "${name}"? This cannot be undone.`)) return;
    try { await fetch(`/api/alert-rules/${id}`, { method:"DELETE" }); onRefresh(); } catch {}
  }
  async function handleToggleRule(rule) {
    try {
      await fetch(`/api/alert-rules/${rule.id}`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ enabled: !rule.enabled }),
      });
      onRefresh();
    } catch {}
  }
  async function handleAcknowledge(eventId) {
    try { await fetch(`/api/alert-events/${eventId}/acknowledge`, { method:"POST" }); onRefresh(); } catch {}
  }
  async function handleAcknowledgeAll() {
    if (!confirm("Acknowledge all unread alerts?")) return;
    try { await fetch("/api/alert-events/acknowledge-all", { method:"POST" }); onRefresh(); } catch {}
  }

  const filteredEvents = useMemo(() => {
    return alertEvents.filter(e => {
      if (filterRule && e.rule_id !== parseInt(filterRule)) return false;
      if (filterAck === "unack" && e.acknowledged) return false;
      if (filterAck === "ack" && !e.acknowledged) return false;
      return true;
    });
  }, [alertEvents, filterRule, filterAck]);
  const pgEvents = usePagination(filteredEvents, 25);

  const ruleMap = useMemo(() => {
    const m = {};
    alertRules.forEach(r => { m[r.id] = r; });
    return m;
  }, [alertRules]);

  const unackCount = alertEvents.filter(e => !e.acknowledged).length;

  const labelStyle = {display:'block',fontSize:'10px',fontWeight:600,color:'var(--nv-text-dim)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.05em'};

  return (
    <>
      {/* Tab toggle */}
      <div style={{display:'flex',gap:'8px',marginBottom:'20px',alignItems:'center'}}>
        <div style={{display:'flex',gap:'2px',background:'var(--nv-bg)',borderRadius:'8px',padding:'2px',border:'1px solid var(--nv-border)'}}>
          {[{k:'events',l:'Alert History'},{k:'rules',l:'Alert Rules'}].map(t=>(
            <button key={t.k} className="btn btn-sm" onClick={()=>setTab(t.k)}
              style={{borderRadius:'6px',padding:'6px 18px',fontSize:'13px',
                background:tab===t.k?'var(--nv-green)':'transparent',
                color:tab===t.k?'#000':'var(--nv-text-muted)',
                fontWeight:tab===t.k?700:500,border:'none'}}>
              {t.l}
              {t.k==='events' && unackCount > 0 && (
                <span style={{marginLeft:'6px',background:tab===t.k?'rgba(0,0,0,0.2)':'#ff5050',color:tab===t.k?'#000':'#fff',
                  fontSize:'10px',fontWeight:700,padding:'1px 6px',borderRadius:'100px'}}>{unackCount}</span>
              )}
            </button>
          ))}
        </div>
        <div style={{flex:1}}></div>
        <button className="btn btn-secondary btn-icon" onClick={onRefresh} title="Refresh"><IconRefresh /></button>
      </div>

      {/* Events Tab */}
      {tab === "events" && (
        <>
          <div style={{display:'flex',gap:'12px',alignItems:'flex-end',marginBottom:'16px',flexWrap:'wrap'}}>
            <div>
              <div style={labelStyle}>Rule</div>
              <select className="select" value={filterRule} onChange={e=>setFilterRule(e.target.value)} style={{minWidth:'180px'}}>
                <option value="">All rules</option>
                {alertRules.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div>
              <div style={labelStyle}>Status</div>
              <select className="select" value={filterAck} onChange={e=>setFilterAck(e.target.value)} style={{minWidth:'130px'}}>
                <option value="all">All</option>
                <option value="unack">Unacknowledged</option>
                <option value="ack">Acknowledged</option>
              </select>
            </div>
            <div style={{flex:1}}></div>
            {unackCount > 0 && (
              <button className="btn btn-secondary btn-sm" onClick={handleAcknowledgeAll}>
                <IconCheck /> Acknowledge All ({unackCount})
              </button>
            )}
          </div>

          <div className="card">
            <div style={{overflowX:'auto'}}>
              <table className="runs-table">
                <thead>
                  <tr>
                    <th style={{width:'40px'}}></th>
                    <th>Alert</th><th>Metric</th><th>Value</th>
                    <th>Threshold</th><th>Dataset</th><th>Commit</th>
                    <th>Host</th><th>Time</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {alertEventsLoading ? (
                    <tr><td colSpan="10" style={{textAlign:'center',padding:'60px',color:'var(--nv-text-muted)'}}>
                      <div className="spinner spinner-lg" style={{margin:'0 auto 12px'}}></div><div>Loading alerts…</div>
                    </td></tr>
                  ) : filteredEvents.length === 0 ? (
                    <tr><td colSpan="10" style={{textAlign:'center',padding:'60px',color:'var(--nv-text-muted)'}}>
                      <div style={{marginBottom:'8px',fontSize:'15px'}}>{filterAck==='unack'?'No unacknowledged alerts':'No alerts found'}</div>
                      <div style={{fontSize:'12px',color:'var(--nv-text-dim)'}}>Alerts are generated when a run metric violates a rule threshold.</div>
                    </td></tr>
                  ) : pgEvents.pageData.map(ev => {
                    const rule = ruleMap[ev.rule_id];
                    return (
                      <tr key={ev.id} style={{background:!ev.acknowledged?'rgba(255,60,60,0.04)':'inherit',cursor:'default'}}>
                        <td>
                          {!ev.acknowledged
                            ? <span style={{display:'inline-block',width:'8px',height:'8px',borderRadius:'50%',background:'#ff5050',boxShadow:'0 0 6px rgba(255,80,80,0.5)'}}></span>
                            : <span style={{display:'inline-block',width:'8px',height:'8px',borderRadius:'50%',background:'#333'}}></span>}
                        </td>
                        <td>
                          <div style={{color:'#fff',fontWeight:500,fontSize:'13px'}}>{rule?.name || (ev.rule_id === 0 ? "System Alert" : `Rule #${ev.rule_id}`)}</div>
                          <div style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'2px',maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={ev.message}>{ev.message}</div>
                        </td>
                        <td><span className="badge badge-na">{METRIC_LABELS[ev.metric]||ev.metric}</span></td>
                        <td className="mono" style={{color:'#ff5050',fontWeight:600,fontSize:'13px'}}>{(ev.metric === "system" || ev.operator === "system") ? "\u2014" : (ev.metric_value != null ? ev.metric_value.toFixed(4) : "\u2014")}</td>
                        <td className="mono" style={{color:'var(--nv-text-muted)',fontSize:'13px'}}>{(ev.metric === "system" || ev.operator === "system") ? "\u2014" : `${ev.operator} ${ev.threshold}`}</td>
                        <td style={{color:'var(--nv-text-muted)',fontSize:'12px'}}>{ev.dataset || "\u2014"}</td>
                        <td>
                          <CommitLink sha={ev.git_commit} repoUrl={githubRepoUrl} />
                        </td>
                        <td style={{color:'var(--nv-text-muted)',fontSize:'12px',whiteSpace:'nowrap'}}>{ev.hostname||"\u2014"}</td>
                        <td style={{color:'var(--nv-text-muted)',fontSize:'12px',whiteSpace:'nowrap'}}>{fmtTs(ev.created_at)}</td>
                        <td>
                          <div style={{display:'flex',gap:'6px',flexWrap:'nowrap'}}>
                            {ev.run_id && ev.run_id !== 0 ? (
                              <button className="btn btn-secondary btn-sm" onClick={()=>onSelectRun(ev.run_id)} title="View Run">
                                <IconExternalLink /> Run #{ev.run_id}
                              </button>
                            ) : (
                              <span className="badge badge-na" style={{fontSize:'11px'}}>System</span>
                            )}
                            {!ev.acknowledged && (
                              <button className="btn btn-sm" onClick={()=>handleAcknowledge(ev.id)} title="Acknowledge"
                                style={{background:'rgba(118,185,0,0.1)',color:'var(--nv-green)',border:'1px solid rgba(118,185,0,0.2)'}}>
                                <IconCheck />
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <Pagination page={pgEvents.page} totalPages={pgEvents.totalPages} totalItems={pgEvents.totalItems}
              pageSize={pgEvents.pageSize} onPageChange={pgEvents.setPage} onPageSizeChange={pgEvents.setPageSize} />
          </div>
        </>
      )}

      {/* Rules Tab */}
      {tab === "rules" && (
        <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <button className="btn btn-primary" onClick={handleCreateRule}><IconPlus /> Create Alert Rule</button>
          </div>

          <div className="card">
            <div style={{overflowX:'auto'}}>
              <table className="runs-table">
                <thead>
                  <tr>
                    <th style={{width:'60px'}}>Enabled</th>
                    <th>Name</th><th>Condition</th><th>Scope</th>
                    <th>Created</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {alertRulesLoading ? (
                    <tr><td colSpan="6" style={{textAlign:'center',padding:'60px',color:'var(--nv-text-muted)'}}>
                      <div className="spinner spinner-lg" style={{margin:'0 auto 12px'}}></div><div>Loading rules…</div>
                    </td></tr>
                  ) : alertRules.length === 0 ? (
                    <tr><td colSpan="6" style={{textAlign:'center',padding:'60px',color:'var(--nv-text-muted)'}}>
                      <div style={{marginBottom:'8px',fontSize:'15px'}}>No alert rules defined</div>
                      <div style={{fontSize:'12px',color:'var(--nv-text-dim)'}}>Create a rule to get notified when a metric goes out of range.</div>
                    </td></tr>
                  ) : pgRules.pageData.map(r => (
                    <tr key={r.id} style={{cursor:'default'}}>
                      <td>
                        <label className="toggle">
                          <input type="checkbox" checked={r.enabled} onChange={()=>handleToggleRule(r)} />
                          <span className="toggle-slider"></span>
                        </label>
                      </td>
                      <td>
                        <div style={{color:'#fff',fontWeight:500}}>{r.name}</div>
                        {r.description && <div style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'2px'}}>{r.description}</div>}
                      </td>
                      <td>
                        <span style={{display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'13px'}}>
                          <span className="badge badge-na">{METRIC_LABELS[r.metric]||r.metric}</span>
                          <span style={{color:'var(--nv-text-muted)',fontWeight:600}}>{r.operator}</span>
                          <span className="mono" style={{color:'var(--nv-green)',fontWeight:600}}>{r.threshold}</span>
                        </span>
                      </td>
                      <td style={{fontSize:'12px',color:'var(--nv-text-muted)'}}>
                        {r.dataset_filter || r.preset_filter
                          ? [r.dataset_filter && `Dataset: ${r.dataset_filter}`, r.preset_filter && `Preset: ${r.preset_filter}`].filter(Boolean).join(", ")
                          : "All runs"}
                      </td>
                      <td style={{color:'var(--nv-text-muted)',fontSize:'12px',whiteSpace:'nowrap'}}>{fmtTs(r.created_at)}</td>
                      <td>
                        <div style={{display:'flex',gap:'6px',flexWrap:'nowrap'}}>
                          <button className="btn btn-secondary btn-sm" onClick={()=>handleEditRule(r)} title="Edit"><IconEdit /> Edit</button>
                          <button className="btn btn-sm" onClick={()=>handleDeleteRule(r.id,r.name)} title="Delete"
                            style={{background:'rgba(255,80,80,0.1)',color:'#ff5050',border:'1px solid rgba(255,80,80,0.2)'}}><IconTrash /> Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <Pagination page={pgRules.page} totalPages={pgRules.totalPages} totalItems={pgRules.totalItems}
              pageSize={pgRules.pageSize} onPageChange={pgRules.setPage} onPageSizeChange={pgRules.setPageSize} />
          </div>
        </>
      )}

      {showForm && (
        <AlertRuleFormModal
          rule={editRule}
          onClose={()=>setShowForm(false)}
          onSaved={()=>{setShowForm(false);onRefresh();}}
        />
      )}
    </>
  );
}

function AlertRuleFormModal({ rule, onClose, onSaved }) {
  const isEdit = !!rule;
  const [metrics, setMetrics] = useState([]);
  const [operators, setOperators] = useState([]);
  const [datasets, setDatasets] = useState([]);
  const [presets, setPresets] = useState([]);
  const [form, setForm] = useState({
    name: rule?.name || "",
    description: rule?.description || "",
    metric: rule?.metric || "pages_per_sec",
    operator: rule?.operator || "<",
    threshold: rule?.threshold ?? "",
    dataset_filter: rule?.dataset_filter || "",
    preset_filter: rule?.preset_filter || "",
    enabled: rule?.enabled ?? true,
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    fetch("/api/alert-metrics").then(r=>r.json()).then(d=>{
      setMetrics(d.metrics||[]);
      setOperators(d.operators||[]);
    }).catch(()=>{});
    fetch("/api/config").then(r=>r.json()).then(cfg=>{
      setDatasets(cfg.datasets||[]);
      setPresets(cfg.presets||[]);
    }).catch(()=>{});
  }, []);

  function set(k,v) { setForm(f=>({...f,[k]:v})); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim() || form.threshold === "") return;
    setSaving(true);
    setError("");
    const payload = {
      name: form.name.trim(),
      description: form.description.trim() || null,
      metric: form.metric,
      operator: form.operator,
      threshold: parseFloat(form.threshold),
      dataset_filter: form.dataset_filter || null,
      preset_filter: form.preset_filter || null,
      enabled: form.enabled,
    };
    try {
      const url = isEdit ? `/api/alert-rules/${rule.id}` : "/api/alert-rules";
      const method = isEdit ? "PUT" : "POST";
      const res = await fetch(url, { method, headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
      if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.detail||`HTTP ${res.status}`); }
      onSaved();
    } catch (err) { setError(err.message); } finally { setSaving(false); }
  }

  const labelStyle = {display:'block',fontSize:'12px',fontWeight:500,color:'var(--nv-text-muted)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.04em'};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'540px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{isEdit?"Edit Alert Rule":"Create Alert Rule"}</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px',maxHeight:'65vh',overflowY:'auto'}}>
            {error && (
              <div style={{padding:'10px 14px',borderRadius:'8px',background:'rgba(255,50,50,0.08)',border:'1px solid rgba(255,50,50,0.2)',color:'#ff5050',fontSize:'13px'}}>{error}</div>
            )}
            <div>
              <label style={labelStyle}>Rule Name *</label>
              <input className="input" style={{width:'100%'}} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. PPS regression threshold" required />
            </div>
            <div>
              <label style={labelStyle}>Description</label>
              <input className="input" style={{width:'100%'}} value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Optional description" />
            </div>

            {/* Condition */}
            <div style={{borderTop:'1px solid var(--nv-border)',paddingTop:'16px'}}>
              <div style={{fontSize:'13px',fontWeight:600,color:'var(--nv-green)',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Condition</div>
              <div style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'14px',color:'#fff',padding:'12px 16px',background:'var(--nv-bg)',borderRadius:'8px',border:'1px solid var(--nv-border)'}}>
                <span style={{color:'var(--nv-text-muted)'}}>Alert when</span>
                <select className="select" value={form.metric} onChange={e=>set('metric',e.target.value)} style={{minWidth:'130px'}}>
                  {metrics.filter(m=>m!=='system').map(m=><option key={m} value={m}>{METRIC_LABELS[m]||m}</option>)}
                </select>
                <span style={{color:'var(--nv-text-muted)'}}>is</span>
                <select className="select" value={form.operator} onChange={e=>set('operator',e.target.value)} style={{minWidth:'80px'}}>
                  {operators.map(op=><option key={op} value={op}>{op} ({OPERATOR_LABELS[op]||op})</option>)}
                </select>
                <input className="input mono" type="number" step="any" style={{width:'100px',textAlign:'center'}} value={form.threshold} onChange={e=>set('threshold',e.target.value)} placeholder="0" required />
              </div>
              <div style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'6px',paddingLeft:'4px'}}>
                Example: Alert when Pages / sec is {"<"} 50 — fires if a run's pages/sec drops below 50.
              </div>
            </div>

            {/* Scope */}
            <div style={{borderTop:'1px solid var(--nv-border)',paddingTop:'16px'}}>
              <div style={{fontSize:'13px',fontWeight:600,color:'var(--nv-green)',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Scope (optional filters)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                <div>
                  <label style={labelStyle}>Dataset</label>
                  <select className="select" style={{width:'100%'}} value={form.dataset_filter} onChange={e=>set('dataset_filter',e.target.value)}>
                    <option value="">All datasets</option>
                    {datasets.map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Preset</label>
                  <select className="select" style={{width:'100%'}} value={form.preset_filter} onChange={e=>set('preset_filter',e.target.value)}>
                    <option value="">All presets</option>
                    {presets.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              </div>
            </div>

            {/* Enabled */}
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <label className="toggle">
                <input type="checkbox" checked={form.enabled} onChange={e=>set('enabled',e.target.checked)} />
                <span className="toggle-slider"></span>
              </label>
              <span style={{fontSize:'14px',color:'var(--nv-text)'}}>Rule is {form.enabled?'enabled':'disabled'}</span>
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" disabled={saving||!form.name.trim()||form.threshold===""} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
              {saving ? <><span className="spinner" style={{marginRight:'8px'}}></span>Saving…</> : isEdit?"Update Rule":"Create Rule"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ===== Analytics View ===== */
const ANALYTICS_METRICS = [
  { key: "pages_per_sec", label: "Pages / sec" },
  { key: "recall_1", label: "Recall@1" },
  { key: "recall_5", label: "Recall@5" },
  { key: "recall_10", label: "Recall@10" },
  { key: "ingest_secs", label: "Ingest Time (s)" },
  { key: "pages", label: "Pages" },
  { key: "files", label: "Files" },
];

const CHART_COLORS = [
  '#76b900','#64b4ff','#a882ff','#fcd34d','#ff5050',
  '#ff8c00','#00d4aa','#ff69b4','#4ecdc4','#95e1d3',
  '#f38181','#aa96da','#45b7d1','#96ceb4','#dfe6e9',
];

function parseRunTimestamp(ts) {
  if (!ts) return null;
  if (/^\d{8}_\d{6}_UTC$/.test(ts)) {
    return new Date(Date.UTC(+ts.slice(0,4), +ts.slice(4,6)-1, +ts.slice(6,8), +ts.slice(9,11), +ts.slice(11,13), +ts.slice(13,15)));
  }
  try { return new Date(ts); } catch { return null; }
}

function AnalyticsView({ runs, datasets, loading, onRefresh }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  const [chartType, setChartType] = useState("line");
  const [yMetric, setYMetric] = useState("pages_per_sec");
  const [xMetric, setXMetric] = useState("pages");
  const [groupBy, setGroupBy] = useState("dataset");
  const [filterDataset, setFilterDataset] = useState("");
  const [filterPreset, setFilterPreset] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");

  const allDatasets = useMemo(() => [...new Set(runs.map(r => r.dataset).filter(Boolean))].sort(), [runs]);
  const allPresets = useMemo(() => [...new Set(runs.map(r => r.preset).filter(Boolean))].sort(), [runs]);

  const filteredRuns = useMemo(() => {
    return runs.filter(r => {
      if (filterDataset && r.dataset !== filterDataset) return false;
      if (filterPreset && r.preset !== filterPreset) return false;
      if (filterStatus === "pass" && r.success !== 1) return false;
      if (filterStatus === "fail" && r.success !== 0) return false;
      if (dateFrom || dateTo) {
        const d = parseRunTimestamp(r.timestamp);
        if (!d) return false;
        if (dateFrom && d < new Date(dateFrom + "T00:00:00Z")) return false;
        if (dateTo && d > new Date(dateTo + "T23:59:59Z")) return false;
      }
      return true;
    });
  }, [runs, filterDataset, filterPreset, filterStatus, dateFrom, dateTo]);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (filteredRuns.length === 0) return;

    const yKey = yMetric;

    if (chartType === "line" || chartType === "scatter") {
      const groups = {};
      filteredRuns.forEach(r => {
        const group = r[groupBy] || "unknown";
        if (!groups[group]) groups[group] = [];
        const yVal = r[yKey];
        if (yVal == null) return;
        if (chartType === "line") {
          const date = parseRunTimestamp(r.timestamp);
          if (date) groups[group].push({ x: date, y: yVal, _run: r });
        } else {
          const xVal = r[xMetric];
          if (xVal != null) groups[group].push({ x: xVal, y: yVal, _run: r });
        }
      });

      const chartDatasets = Object.entries(groups).map(([name, points], i) => ({
        label: name,
        data: points.sort((a, b) => (a.x instanceof Date ? a.x.getTime() - b.x.getTime() : a.x - b.x)),
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '40',
        pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
        tension: 0.3,
        pointRadius: 5,
        pointHoverRadius: 8,
        fill: false,
        borderWidth: 2,
      }));

      const yLabel = (ANALYTICS_METRICS.find(m => m.key === yMetric) || {}).label || yMetric;
      const xLabel = chartType === "line" ? "Date" : (ANALYTICS_METRICS.find(m => m.key === xMetric) || {}).label || xMetric;

      chartRef.current = new Chart(canvasRef.current, {
        type: chartType === "line" ? "line" : "scatter",
        data: { datasets: chartDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 400 },
          interaction: { mode: 'nearest', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { color: '#e0e0e0', font: { family: 'Inter', size: 12 }, usePointStyle: true, pointStyle: 'circle', padding: 16 } },
            tooltip: {
              backgroundColor: '#1e1e1e', titleColor: '#fff', bodyColor: '#ccc',
              borderColor: '#333', borderWidth: 1, padding: 12,
              titleFont: { family: 'Inter', weight: '600' },
              bodyFont: { family: 'JetBrains Mono', size: 12 },
              callbacks: {
                title: (items) => {
                  const r = items[0]?.raw?._run;
                  return r ? `Run #${r.id} — ${r.dataset}` : '';
                },
                label: (ctx) => {
                  const lines = [`  ${ctx.dataset.label}`];
                  lines.push(`  ${yLabel}: ${ctx.parsed.y?.toFixed(3)}`);
                  if (chartType === "line") {
                    lines.push(`  Date: ${new Date(ctx.parsed.x).toLocaleString()}`);
                  } else {
                    lines.push(`  ${xLabel}: ${ctx.parsed.x?.toFixed(3)}`);
                  }
                  const r = ctx.raw?._run;
                  if (r?.preset) lines.push(`  Preset: ${r.preset}`);
                  if (r?.hostname) lines.push(`  Host: ${r.hostname}`);
                  return lines;
                },
              },
            },
          },
          scales: {
            x: chartType === "line" ? {
              type: 'time',
              time: { tooltipFormat: 'MMM d, yyyy HH:mm', displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' } },
              ticks: { color: '#888', font: { size: 11 }, maxRotation: 45 },
              grid: { color: 'rgba(255,255,255,0.04)' },
              title: { display: true, text: 'Date', color: '#888', font: { size: 12 } },
            } : {
              type: 'linear',
              ticks: { color: '#888', font: { size: 11 } },
              grid: { color: 'rgba(255,255,255,0.04)' },
              title: { display: true, text: xLabel, color: '#888', font: { size: 12 } },
            },
            y: {
              ticks: { color: '#888', font: { size: 11 } },
              grid: { color: 'rgba(255,255,255,0.04)' },
              title: { display: true, text: yLabel, color: '#888', font: { size: 12 } },
            },
          },
        },
      });
    } else if (chartType === "bar") {
      const groups = {};
      filteredRuns.forEach(r => {
        const group = r[groupBy] || "unknown";
        if (!groups[group]) groups[group] = [];
        const val = r[yKey];
        if (val != null) groups[group].push(val);
      });
      const labels = Object.keys(groups).sort();
      const avgData = labels.map(l => { const v = groups[l]; return v.reduce((a,b)=>a+b,0)/v.length; });
      const minData = labels.map(l => Math.min(...groups[l]));
      const maxData = labels.map(l => Math.max(...groups[l]));
      const yLabel = (ANALYTICS_METRICS.find(m => m.key === yMetric) || {}).label || yMetric;

      chartRef.current = new Chart(canvasRef.current, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: `Avg ${yLabel}`, data: avgData, backgroundColor: labels.map((_,i) => CHART_COLORS[i % CHART_COLORS.length] + 'cc'), borderColor: labels.map((_,i) => CHART_COLORS[i % CHART_COLORS.length]), borderWidth: 1, borderRadius: 4 },
            { label: `Min`, data: minData, backgroundColor: 'rgba(255,255,255,0.06)', borderColor: 'rgba(255,255,255,0.15)', borderWidth: 1, borderRadius: 4 },
            { label: `Max`, data: maxData, backgroundColor: 'rgba(118,185,0,0.15)', borderColor: 'rgba(118,185,0,0.4)', borderWidth: 1, borderRadius: 4 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 400 },
          plugins: {
            legend: { position: 'top', labels: { color: '#e0e0e0', font: { family: 'Inter', size: 12 }, padding: 16 } },
            tooltip: { backgroundColor: '#1e1e1e', titleColor: '#fff', bodyColor: '#ccc', borderColor: '#333', borderWidth: 1, bodyFont: { family: 'JetBrains Mono', size: 12 } },
          },
          scales: {
            x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
            y: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' }, title: { display: true, text: yLabel, color: '#888', font: { size: 12 } } },
          },
        },
      });
    }

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [filteredRuns, chartType, yMetric, xMetric, groupBy]);

  const stats = useMemo(() => {
    const vals = filteredRuns.map(r => r[yMetric]).filter(v => v != null);
    if (!vals.length) return null;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const sorted = [...vals].sort((a,b)=>a-b);
    const median = sorted.length%2===0 ? (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2 : sorted[Math.floor(sorted.length/2)];
    const stddev = Math.sqrt(vals.reduce((sum,v)=>sum+Math.pow(v-avg,2),0)/vals.length);
    return { count: vals.length, avg, min: sorted[0], max: sorted[sorted.length-1], median, stddev };
  }, [filteredRuns, yMetric]);

  const labelStyle = {display:'block',fontSize:'10px',fontWeight:600,color:'var(--nv-text-dim)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.05em'};
  const yLabel = (ANALYTICS_METRICS.find(m=>m.key===yMetric)||{}).label || yMetric;

  return (
    <>
      {/* Controls */}
      <div className="card" style={{padding:'16px 20px',marginBottom:'20px'}}>
        <div style={{display:'flex',gap:'16px',alignItems:'flex-end',flexWrap:'wrap'}}>
          {/* Chart Type */}
          <div>
            <div style={labelStyle}>Chart Type</div>
            <div style={{display:'flex',gap:'2px',background:'var(--nv-bg)',borderRadius:'8px',padding:'2px',border:'1px solid var(--nv-border)'}}>
              {[{k:'line',l:'Line'},{k:'scatter',l:'Scatter'},{k:'bar',l:'Bar'}].map(t=>(
                <button key={t.k} className="btn btn-sm" onClick={()=>setChartType(t.k)}
                  style={{borderRadius:'6px',padding:'5px 14px',fontSize:'12px',
                    background:chartType===t.k?'var(--nv-green)':'transparent',
                    color:chartType===t.k?'#000':'var(--nv-text-muted)',
                    fontWeight:chartType===t.k?700:500,border:'none'}}>
                  {t.l}
                </button>
              ))}
            </div>
          </div>

          {/* Y Axis */}
          <div>
            <div style={labelStyle}>Y Axis</div>
            <select className="select" value={yMetric} onChange={e=>setYMetric(e.target.value)} style={{minWidth:'140px'}}>
              {ANALYTICS_METRICS.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
            </select>
          </div>

          {/* X Axis (scatter only) */}
          {chartType === "scatter" && (
            <div>
              <div style={labelStyle}>X Axis</div>
              <select className="select" value={xMetric} onChange={e=>setXMetric(e.target.value)} style={{minWidth:'140px'}}>
                {ANALYTICS_METRICS.filter(m=>m.key!==yMetric).map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
              </select>
            </div>
          )}

          {/* Group By */}
          <div>
            <div style={labelStyle}>Group By</div>
            <select className="select" value={groupBy} onChange={e=>setGroupBy(e.target.value)} style={{minWidth:'110px'}}>
              <option value="dataset">Dataset</option>
              <option value="preset">Preset</option>
              <option value="hostname">Host</option>
              <option value="gpu_type">GPU Type</option>
            </select>
          </div>

          <div style={{flex:'1 0 0',minWidth:'40px'}}></div>
          <button className="btn btn-secondary btn-icon" onClick={onRefresh} title="Refresh"><IconRefresh /></button>
        </div>

        {/* Filters row */}
        <div style={{display:'flex',gap:'12px',alignItems:'flex-end',flexWrap:'wrap',marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--nv-border)'}}>
          <div>
            <div style={labelStyle}>Dataset</div>
            <select className="select" value={filterDataset} onChange={e=>setFilterDataset(e.target.value)} style={{minWidth:'150px'}}>
              <option value="">All datasets</option>
              {allDatasets.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <div style={labelStyle}>Preset</div>
            <select className="select" value={filterPreset} onChange={e=>setFilterPreset(e.target.value)} style={{minWidth:'130px'}}>
              <option value="">All presets</option>
              {allPresets.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <div style={labelStyle}>Status</div>
            <select className="select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{minWidth:'100px'}}>
              <option value="all">All</option>
              <option value="pass">Pass only</option>
              <option value="fail">Fail only</option>
            </select>
          </div>
          <div>
            <div style={labelStyle}>From</div>
            <input type="date" className="input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{minWidth:'140px',colorScheme:'dark'}} />
          </div>
          <div>
            <div style={labelStyle}>To</div>
            <input type="date" className="input" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{minWidth:'140px',colorScheme:'dark'}} />
          </div>
          {(filterDataset||filterPreset||filterStatus!=='all'||dateFrom||dateTo) && (
            <button className="btn btn-ghost btn-sm" onClick={()=>{setFilterDataset('');setFilterPreset('');setFilterStatus('all');setDateFrom('');setDateTo('');}}
              style={{color:'var(--nv-text-muted)',whiteSpace:'nowrap'}}>
              <IconX /> Clear filters
            </button>
          )}
        </div>
      </div>

      {/* Chart */}
      <div className="card" style={{padding:'20px',marginBottom:'20px'}}>
        <div style={{position:'relative',height:'450px'}}>
          {loading ? (
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',flexDirection:'column',gap:'12px',color:'var(--nv-text-muted)'}}>
              <div className="spinner spinner-lg"></div><div>Loading data…</div>
            </div>
          ) : filteredRuns.length === 0 ? (
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',flexDirection:'column',gap:'8px',color:'var(--nv-text-muted)'}}>
              <IconChart />
              <div style={{fontSize:'15px'}}>No data matching filters</div>
              <div style={{fontSize:'12px',color:'var(--nv-text-dim)'}}>Adjust filters or trigger some runs to see analytics.</div>
            </div>
          ) : (
            <canvas ref={canvasRef}></canvas>
          )}
        </div>
      </div>

      {/* Summary Stats */}
      {stats && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:'12px'}}>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px',color:'#fff'}}>{stats.count}</div>
            <div className="metric-label">Runs</div>
          </div>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px'}}>{stats.avg.toFixed(2)}</div>
            <div className="metric-label">Avg {yLabel}</div>
          </div>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px'}}>{stats.median.toFixed(2)}</div>
            <div className="metric-label">Median</div>
          </div>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px',color:'#64b4ff'}}>{stats.min.toFixed(2)}</div>
            <div className="metric-label">Min</div>
          </div>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px',color:'#fcd34d'}}>{stats.max.toFixed(2)}</div>
            <div className="metric-label">Max</div>
          </div>
          <div className="metric-card">
            <div className="metric-value" style={{fontSize:'20px',color:'var(--nv-text-muted)'}}>{stats.stddev.toFixed(2)}</div>
            <div className="metric-label">Std Dev</div>
          </div>
        </div>
      )}
    </>
  );
}
