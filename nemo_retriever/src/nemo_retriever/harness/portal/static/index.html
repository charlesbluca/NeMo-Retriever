                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Reranker test panel */}
      {activeTab === 'rerank' && (
        <div className="card" style={{padding:'24px'}}>
          <div style={{fontSize:'15px',fontWeight:600,color:'#fff',marginBottom:'16px'}}>Reranker Model Test</div>
          <div style={{marginBottom:'16px'}}>
            <label style={labelStyle}>Model</label>
            <select className="select" style={{width:'100%',maxWidth:'500px'}} value={rerankModels[0]?.id || ''} disabled={rerankModels.length <= 1}>
              {rerankModels.map(m => <option key={m.id} value={m.id}>{m.name} ({m.id})</option>)}
              {rerankModels.length === 0 && <option value="">No reranker models available</option>}
            </select>
          </div>
          <div style={{marginBottom:'16px'}}>
            <label style={labelStyle}>Query</label>
            <input className="input" style={{width:'100%'}} value={rerankQuery} onChange={e=>setRerankQuery(e.target.value)} placeholder="Enter your search query…" />
          </div>
          <div style={{marginBottom:'16px'}}>
            <label style={labelStyle}>Documents (one per line)</label>
            <textarea className="input" rows={6} style={{width:'100%',fontFamily:'var(--font-mono)',fontSize:'12px',resize:'vertical'}}
              value={rerankDocs} onChange={e=>setRerankDocs(e.target.value)} placeholder={"Enter candidate documents, one per line…"} />
            <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'4px'}}>Each line is scored independently against the query. Higher scores indicate greater relevance.</div>
          </div>
          <button className="btn btn-primary" onClick={runRerank} disabled={rerankLoading || !rerankQuery.trim() || !rerankDocs.trim()}>
            {rerankLoading ? <><span className="spinner" style={{marginRight:'8px'}}></span>Scoring…</> : 'Run Reranking'}
          </button>
          {rerankError && <div style={{marginTop:'16px',padding:'12px 16px',borderRadius:'6px',background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.2)',color:'#ff5050',fontSize:'13px'}}>{rerankError}</div>}
          {rerankResult && (
            <div style={{marginTop:'20px'}}>
              <div style={{display:'flex',gap:'16px',flexWrap:'wrap',marginBottom:'16px'}}>
                {[{label:'Model',value:rerankResult.model_id},{label:'Query',value:rerankResult.query.length>40?rerankResult.query.slice(0,40)+'…':rerankResult.query},{label:'Documents',value:rerankResult.count},{label:'Load Time',value:`${rerankResult.model_load_ms}ms`},{label:'Score Time',value:`${rerankResult.score_ms}ms`}].map(s => (
                  <div key={s.label} style={{background:'rgba(138,43,226,0.06)',border:'1px solid rgba(138,43,226,0.12)',borderRadius:'6px',padding:'8px 14px',minWidth:'100px'}}>
                    <div style={{fontSize:'10px',color:'var(--nv-text-dim)',textTransform:'uppercase',fontWeight:600,marginBottom:'2px'}}>{s.label}</div>
                    <div className="mono" style={{fontSize:'13px',color:'#bb86fc',fontWeight:600}}>{s.value}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'10px'}}>Results (sorted by relevance)</div>
              {rerankResult.results.map((r, i) => {
                const maxScore = Math.max(...rerankResult.results.map(x => x.score));
                const minScore = Math.min(...rerankResult.results.map(x => x.score));
                const range = maxScore - minScore || 1;
                const barPct = Math.max(5, ((r.score - minScore) / range) * 100);
                return (
                  <div key={i} style={{marginBottom:'8px',background:'var(--nv-surface)',border:'1px solid var(--nv-border)',borderRadius:'8px',padding:'12px 16px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'6px'}}>
                      <span style={{fontSize:'18px',fontWeight:700,color:scoreColor(r.score),minWidth:'28px'}}>#{r.rank}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:'13px',color:'#fff',lineHeight:'1.5',wordBreak:'break-word'}}>{r.document}</div>
                      </div>
                      <span className="mono" style={{fontSize:'16px',fontWeight:700,color:scoreColor(r.score),whiteSpace:'nowrap'}}>
                        {r.score > 0 ? '+' : ''}{r.score}
                      </span>
                    </div>
                    <div style={{height:'4px',borderRadius:'2px',background:'rgba(255,255,255,0.04)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${barPct}%`,borderRadius:'2px',background:scoreColor(r.score),transition:'width 0.3s'}} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Document AI / Vision test panel */}
      {activeTab === 'vision' && (
        <div className="card" style={{padding:'24px'}}>
          <div style={{fontSize:'15px',fontWeight:600,color:'#fff',marginBottom:'16px'}}>Document AI Model Test</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
            <div>
              <label style={labelStyle}>Model</label>
              <select className="select" style={{width:'100%'}} value={selectedModel || ''} onChange={e=>{setSelectedModel(e.target.value);setVisionResult(null);setVisionError(null);}}>
                {visionModels.map(m => <option key={m.id} value={m.id}>{m.name} ({m.type})</option>)}
              </select>
            </div>
            {models.find(m => m.id === selectedModel)?.type === 'ocr' && (
              <div>
                <label style={labelStyle}>Merge Level</label>
                <select className="select" style={{width:'100%'}} value={ocrMerge} onChange={e=>setOcrMerge(e.target.value)}>
                  <option value="word">Word</option>
                  <option value="sentence">Sentence</option>
                  <option value="paragraph">Paragraph</option>
                </select>
                <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'4px'}}>Controls how recognized text regions are grouped together.</div>
              </div>
            )}
            {models.find(m => m.id === selectedModel)?.type === 'object-detection' && (
              <div>
                <label style={labelStyle}>Score Threshold</label>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <input type="range" min="0" max="1" step="0.05" value={detectThreshold}
                    onChange={e=>setDetectThreshold(parseFloat(e.target.value))}
                    style={{flex:1,accentColor:'var(--nv-green)'}} />
                  <span className="mono" style={{fontSize:'13px',color:'var(--nv-green)',fontWeight:600,minWidth:'40px',textAlign:'right'}}>{(detectThreshold*100).toFixed(0)}%</span>
                </div>
                <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'4px'}}>Only detections above this confidence score are shown.</div>
              </div>
            )}
          </div>
          <div style={{marginBottom:'16px'}}>
            <label style={labelStyle}>Upload Document Image</label>
            <div style={{border:'2px dashed var(--nv-border)',borderRadius:'8px',padding:'24px',textAlign:'center',cursor:'pointer',
              background:imagePreview?'transparent':'rgba(255,255,255,0.02)',position:'relative',overflow:'hidden'}}
              onClick={()=>document.getElementById('model-img-input').click()}>
              <input id="model-img-input" type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={handleImageUpload} />
              {imagePreview ? (
                <div>
                  <img src={imagePreview} alt="uploaded" style={{maxHeight:'300px',maxWidth:'100%',borderRadius:'6px',marginBottom:'8px'}} />
                  <div style={{fontSize:'11px',color:'var(--nv-text-dim)'}}>Click to replace image</div>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:'28px',marginBottom:'6px',opacity:0.3}}><IconUpload /></div>
                  <div style={{fontSize:'13px',color:'var(--nv-text-muted)'}}>Click or drag to upload a document image (PNG, JPEG)</div>
                </div>
              )}
            </div>
          </div>
          <button className="btn btn-primary" onClick={runVision} disabled={visionLoading || !imageB64 || !selectedModel}>
            {visionLoading ? <><span className="spinner" style={{marginRight:'8px'}}></span>Processing…</> : 'Run Model'}
          </button>
          {visionError && <div style={{marginTop:'16px',padding:'12px 16px',borderRadius:'6px',background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.2)',color:'#ff5050',fontSize:'13px'}}>{visionError}</div>}
          {visionResult && (
            <div style={{marginTop:'20px'}}>
              <div style={{display:'flex',gap:'16px',flexWrap:'wrap',marginBottom:'16px'}}>
                {[
                  {label:'Model',value:visionResult.model_id},
                  {label:'Load Time',value:`${visionResult.model_load_ms}ms`},
                  {label:'Inference',value:`${visionResult.inference_ms}ms`},
                  visionResult.detection_count != null ? {label:'Detections',value:visionResult.detection_count} : null,
                  visionResult.image_size ? {label:'Image',value:`${visionResult.image_size[0]}×${visionResult.image_size[1]}`} : null,
                ].filter(Boolean).map(s => (
                  <div key={s.label} style={{background:'rgba(100,180,255,0.06)',border:'1px solid rgba(100,180,255,0.12)',borderRadius:'6px',padding:'8px 14px',minWidth:'100px'}}>
                    <div style={{fontSize:'10px',color:'var(--nv-text-dim)',textTransform:'uppercase',fontWeight:600,marginBottom:'2px'}}>{s.label}</div>
                    <div className="mono" style={{fontSize:'13px',color:'#64b4ff',fontWeight:600}}>{s.value}</div>
                  </div>
                ))}
              </div>

              {/* Annotated image for detection models */}
              {visionResult.annotated_image && (
                <div style={{marginBottom:'20px'}}>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'8px'}}>Annotated Image</div>
                  <div style={{background:'var(--nv-bg)',border:'1px solid var(--nv-border)',borderRadius:'8px',padding:'12px',textAlign:'center',overflow:'auto'}}>
                    <img src={visionResult.annotated_image} alt="annotated detections"
                      style={{maxWidth:'100%',borderRadius:'4px',cursor:'pointer'}}
                      onClick={(e) => {
                        const w = window.open();
                        if (w) { w.document.write(`<img src="${visionResult.annotated_image}" style="max-width:100%">`); w.document.title = "Detection Result"; }
                      }}
                      title="Click to open full-size in new tab" />
                  </div>
                </div>
              )}

              {/* Detections table */}
              {visionResult.detections && visionResult.detections.length > 0 && (
                <div>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'8px'}}>Detections ({visionResult.detections.length})</div>
                  <div style={{overflowX:'auto'}}>
                    <table className="runs-table" style={{fontSize:'12px'}}>
                      <thead><tr><th>#</th><th>Label</th><th>Score</th><th>Box (px)</th></tr></thead>
                      <tbody>
                        {visionResult.detections.map((d, i) => {
                          const DET_COLORS = {'table':'#76b900','chart':'#64b4ff','title':'#ff8c00','infographic':'#bb86fc',
                            'text':'#ff5050','header_footer':'#00d4aa','cell':'#76b900','merged_cell':'#fcd34d','row':'#64b4ff','column':'#ff8c00',
                            'chart_title':'#76b900','x_axis_title':'#64b4ff','y_axis_title':'#ff8c00','legend_title':'#bb86fc','legend_label':'#fcd34d',
                            'marker_label':'#ff5050','value_label':'#00d4aa','x_tick_label':'#ff69b4','y_tick_label':'#00bfff','other_label':'#90ee90'};
                          const color = DET_COLORS[d.label] || '#aaa';
                          return (
                            <tr key={i}>
                              <td>{i+1}</td>
                              <td>
                                <span style={{display:'inline-flex',alignItems:'center',gap:'6px'}}>
                                  <span style={{width:'10px',height:'10px',borderRadius:'2px',background:color,flexShrink:0}}></span>
                                  <span style={{fontWeight:600}}>{d.label}</span>
                                </span>
                              </td>
                              <td>
                                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                  <div style={{width:'50px',height:'6px',borderRadius:'3px',background:'rgba(255,255,255,0.06)',overflow:'hidden'}}>
                                    <div style={{height:'100%',width:`${d.score*100}%`,borderRadius:'3px',background:color}} />
                                  </div>
                                  <span className="mono" style={{color,fontWeight:600}}>{(d.score*100).toFixed(1)}%</span>
                                </div>
                              </td>
                              <td className="mono" style={{fontSize:'11px',color:'var(--nv-text-dim)'}}>
                                [{d.box.map(v=>Math.round(v)).join(', ')}]
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* OCR text */}
              {visionResult.text && (
                <div>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'8px'}}>Extracted Text</div>
                  <pre style={{background:'var(--nv-bg)',border:'1px solid var(--nv-border)',borderRadius:'8px',padding:'16px',
                    fontSize:'12px',color:'var(--nv-text-muted)',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:'400px',overflow:'auto',lineHeight:'1.6'}}>
                    {visionResult.text}
                  </pre>
                </div>
              )}

              {/* Parse markdown */}
              {visionResult.markdown && (
                <div>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'8px'}}>Parsed Output (Markdown)</div>
                  <pre style={{background:'var(--nv-bg)',border:'1px solid var(--nv-border)',borderRadius:'8px',padding:'16px',
                    fontSize:'12px',color:'var(--nv-text-muted)',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:'500px',overflow:'auto',lineHeight:'1.6'}}>
                    {visionResult.markdown}
                  </pre>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </>
  );
}

/* ===== Settings View ===== */
function SettingsView() {
  const [gitInfo, setGitInfo] = useState(null);
  const [gitLoading, setGitLoading] = useState(true);
  const [deployBranch, setDeployBranch] = useState("main");
  const [deployRemote, setDeployRemote] = useState("origin");
  const [deploying, setDeploying] = useState(false);
  const [deployResult, setDeployResult] = useState(null);
  const [deployError, setDeployError] = useState("");
  const [showConfirm, setShowConfirm] = useState(false);
  const [reconnecting, setReconnecting] = useState(false);

  async function fetchGitInfo() {
    setGitLoading(true);
    try {
      const res = await fetch("/api/settings/git-info");
      const data = await res.json();
      setGitInfo(data);
      if (data.available && data.remotes?.length) {
        setDeployRemote(data.remotes[0].name);
      }
      if (data.available && data.current_branch) {
        setDeployBranch(data.current_branch);
      }
    } catch (err) {
      setGitInfo({ available: false, error: err.message });
    } finally {
      setGitLoading(false);
    }
  }

  useEffect(() => { fetchGitInfo(); }, []);

  async function handleDeploy() {
    setShowConfirm(false);
    setDeploying(true);
    setDeployResult(null);
    setDeployError("");
    try {
      const res = await fetch("/api/settings/deploy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ branch: deployBranch, remote: deployRemote }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      setDeployResult(data);
      setReconnecting(true);
      pollForRestart();
    } catch (err) {
      setDeployError(err.message);
    } finally {
      setDeploying(false);
    }
  }

  function pollForRestart() {
    let attempts = 0;
    const maxAttempts = 30;
    const interval = setInterval(async () => {
      attempts++;
      try {
        const res = await fetch("/api/version", { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          clearInterval(interval);
          setReconnecting(false);
          fetchGitInfo();
        }
      } catch {
        if (attempts >= maxAttempts) {
          clearInterval(interval);
          setReconnecting(false);
          setDeployError("Portal did not come back online within 60 seconds. Check the server manually.");
        }
      }
    }, 2000);
  }

  const labelStyle = {display:'block',fontSize:'11px',fontWeight:600,color:'var(--nv-text-dim)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:'6px'};

  if (gitLoading) {
    return (
      <div className="card" style={{padding:'60px',textAlign:'center'}}>
        <span className="spinner spinner-lg" style={{display:'block',margin:'0 auto 16px'}}></span>
        <div style={{color:'var(--nv-text-muted)',fontSize:'14px'}}>Loading git information…</div>
      </div>
    );
  }

  if (!gitInfo || !gitInfo.available) {
    return (
      <div className="card" style={{padding:'40px',textAlign:'center'}}>
        <div style={{fontSize:'32px',marginBottom:'12px',opacity:0.3}}>&#x26A0;</div>
        <div style={{fontSize:'15px',fontWeight:600,color:'#ff5050',marginBottom:'8px'}}>Git Not Available</div>
        <div style={{fontSize:'13px',color:'var(--nv-text-muted)'}}>{gitInfo?.error || "Unable to detect a git repository."}</div>
      </div>
    );
  }

  return (
    <>
      {/* Reconnecting overlay */}
      {reconnecting && (
        <div style={{
          position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:9999,
          background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'20px',
        }}>
          <span className="spinner spinner-lg"></span>
          <div style={{fontSize:'18px',fontWeight:600,color:'#fff'}}>Portal is restarting…</div>
          <div style={{fontSize:'13px',color:'var(--nv-text-muted)',maxWidth:'400px',textAlign:'center',lineHeight:'1.6'}}>
            The portal is pulling the latest code and restarting. This page will automatically reconnect when the server is back online.
          </div>
        </div>
      )}

      {/* Current State */}
      <div className="card" style={{padding:'24px',marginBottom:'20px'}}>
        <div className="section-title" style={{marginBottom:'16px'}}>Current Portal State</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',gap:'16px'}}>
          <div>
            <div style={labelStyle}>Branch</div>
            <div style={{fontSize:'14px',color:'#fff',fontWeight:600}}>{gitInfo.current_branch}</div>
          </div>
          <div>
            <div style={labelStyle}>Commit</div>
            <div className="mono" style={{fontSize:'13px',color:'var(--nv-green)'}}>{gitInfo.current_short_sha}</div>
            <div className="mono" style={{fontSize:'11px',color:'var(--nv-text-dim)',marginTop:'2px',wordBreak:'break-all'}}>{gitInfo.current_sha}</div>
          </div>
          <div>
            <div style={labelStyle}>Working Directory</div>
            <div style={{fontSize:'13px',color:gitInfo.is_dirty ? '#ffb84d' : 'var(--nv-green)',fontWeight:500}}>
              {gitInfo.is_dirty ? "Uncommitted changes" : "Clean"}
            </div>
          </div>
          <div>
            <div style={labelStyle}>Repository</div>
            <div className="mono" style={{fontSize:'11px',color:'var(--nv-text-muted)',wordBreak:'break-all'}}>{gitInfo.repo_root}</div>
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'20px'}}>
        {/* Deploy Card */}
        <div className="card" style={{padding:'24px'}}>
          <div className="section-title" style={{marginBottom:'16px'}}>Deploy Latest Code</div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div>
              <label style={labelStyle}>Remote</label>
              <select className="select" style={{width:'100%'}} value={deployRemote} onChange={e => setDeployRemote(e.target.value)}>
                {(gitInfo.remotes || []).map(r => (
                  <option key={r.name} value={r.name}>{r.name} ({r.url})</option>
                ))}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Branch</label>
              <div style={{display:'flex',gap:'8px'}}>
                <input className="input" style={{flex:1}} value={deployBranch}
                  onChange={e => setDeployBranch(e.target.value)}
                  placeholder="e.g. main" />
              </div>
              {gitInfo.remote_branches?.length > 0 && (
                <div style={{marginTop:'8px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
                  {gitInfo.remote_branches.slice(0, 10).map(b => {
                    const short = b.replace(/^[^/]+\//, "");
                    return (
                      <button key={b} className="btn btn-sm"
                        onClick={() => setDeployBranch(short)}
                        style={{
                          fontSize:'10px',padding:'2px 8px',
                          background: short === deployBranch ? 'rgba(118,185,0,0.15)' : 'transparent',
                          color: short === deployBranch ? 'var(--nv-green)' : 'var(--nv-text-dim)',
                          border: `1px solid ${short === deployBranch ? 'rgba(118,185,0,0.3)' : 'var(--nv-border)'}`,
                        }}>
                        {short}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <button className="btn btn-primary" onClick={() => setShowConfirm(true)}
              disabled={deploying || !deployBranch.trim()}
              style={{width:'100%',justifyContent:'center',marginTop:'4px'}}>
              {deploying ? <><span className="spinner" style={{marginRight:'8px'}}></span>Deploying…</> : <><IconDownload /> Deploy & Restart</>}
            </button>
            <div style={{fontSize:'11px',color:'var(--nv-text-dim)',lineHeight:'1.5'}}>
              This will pull the latest code from <span className="mono" style={{color:'var(--nv-text-muted)'}}>{deployRemote}/{deployBranch}</span>, then restart the portal web server.
              The page will automatically reconnect.
            </div>
          </div>
        </div>

        {/* Recent Commits Card */}
        <div className="card" style={{padding:'24px'}}>
          <div className="section-title" style={{marginBottom:'16px'}}>Recent Commits</div>
          <div style={{display:'flex',flexDirection:'column',gap:'0'}}>
            {(gitInfo.recent_commits || []).map((c, i) => (
              <div key={c.sha} style={{
                display:'flex',gap:'10px',alignItems:'flex-start',padding:'8px 0',
                borderBottom: i < gitInfo.recent_commits.length - 1 ? '1px solid var(--nv-border)' : 'none',
              }}>
                <span className="mono" style={{
                  fontSize:'11px',fontWeight:600,whiteSpace:'nowrap',
                  color: i === 0 ? 'var(--nv-green)' : 'var(--nv-text-dim)',
                }}>{c.short_sha}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'12px',color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.message}</div>
                  <div style={{fontSize:'10px',color:'var(--nv-text-dim)',marginTop:'2px'}}>{c.date}</div>
                </div>
              </div>
            ))}
            {(!gitInfo.recent_commits || gitInfo.recent_commits.length === 0) && (
              <div style={{padding:'20px',textAlign:'center',color:'var(--nv-text-dim)',fontSize:'13px'}}>No commit history available</div>
            )}
          </div>
        </div>
      </div>

      {/* Remotes */}
      <div className="card" style={{padding:'24px',marginBottom:'20px'}}>
        <div className="section-title" style={{marginBottom:'12px'}}>Remotes</div>
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {(gitInfo.remotes || []).map(r => (
            <div key={r.name} style={{display:'flex',alignItems:'center',gap:'12px',padding:'6px 0',borderBottom:'1px solid var(--nv-border)'}}>
              <span style={{fontSize:'13px',fontWeight:600,color:'#fff',minWidth:'80px'}}>{r.name}</span>
              <span className="mono" style={{fontSize:'12px',color:'var(--nv-text-muted)',wordBreak:'break-all'}}>{r.url}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Deploy Result */}
      {deployResult && (
        <div className="card" style={{padding:'20px',marginBottom:'20px',background:'rgba(118,185,0,0.05)',border:'1px solid rgba(118,185,0,0.2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
            <IconCheck />
            <span style={{fontSize:'14px',fontWeight:600,color:'var(--nv-green)'}}>{deployResult.message}</span>
          </div>
          {deployResult.log && deployResult.log.length > 0 && (
            <pre className="mono" style={{
              fontSize:'11px',padding:'12px',borderRadius:'8px',
              background:'var(--nv-bg)',border:'1px solid var(--nv-border)',
              color:'var(--nv-text-muted)',maxHeight:'200px',overflow:'auto',
              whiteSpace:'pre-wrap',wordBreak:'break-all',lineHeight:'1.6',
            }}>{deployResult.log.join("\n")}</pre>
          )}
        </div>
      )}

      {/* Deploy Error */}
      {deployError && (
        <div style={{marginBottom:'16px',padding:'14px 18px',borderRadius:'8px',background:'rgba(255,50,50,0.08)',border:'1px solid rgba(255,50,50,0.2)'}}>
          <div style={{fontSize:'13px',fontWeight:600,color:'#ff5050',marginBottom:'6px'}}>Deploy Failed</div>
          <pre className="mono" style={{fontSize:'12px',color:'#ff5050',whiteSpace:'pre-wrap',wordBreak:'break-all',margin:0}}>{deployError}</pre>
        </div>
      )}

      {/* Confirmation Modal */}
      {showConfirm && (
        <div className="modal-overlay" onClick={() => setShowConfirm(false)}>
          <div className="modal-content" style={{maxWidth:'480px'}} onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>Confirm Deploy</h2>
              <button className="btn btn-ghost btn-icon" onClick={() => setShowConfirm(false)} style={{borderRadius:'50%'}}><IconX /></button>
            </div>
            <div style={{padding:'24px'}}>
              <div style={{fontSize:'14px',color:'var(--nv-text-muted)',lineHeight:'1.7',marginBottom:'16px'}}>
                This will:
              </div>
              <ol style={{fontSize:'13px',color:'#fff',lineHeight:'2',paddingLeft:'20px',marginBottom:'20px'}}>
                <li>Stash any uncommitted local changes</li>
                <li>Fetch the latest code from <span className="mono" style={{color:'var(--nv-green)'}}>{deployRemote}</span></li>
                <li>Checkout branch <span className="mono" style={{color:'var(--nv-green)'}}>{deployBranch}</span></li>
                <li>Restart the portal web server</li>
              </ol>
              {gitInfo.is_dirty && (
                <div style={{padding:'10px 14px',borderRadius:'8px',background:'rgba(255,184,77,0.08)',border:'1px solid rgba(255,184,77,0.25)',color:'#ffb84d',fontSize:'12px',marginBottom:'16px'}}>
                  <strong>Warning:</strong> You have uncommitted changes. They will be stashed before the deploy.
                </div>
              )}
              <div style={{fontSize:'12px',color:'var(--nv-text-dim)',marginBottom:'4px'}}>
                The portal will be briefly unavailable during restart. This page will reconnect automatically.
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-secondary" onClick={() => setShowConfirm(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleDeploy} style={{flex:1,justifyContent:'center'}}>
                <IconDownload /> Deploy {deployBranch}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ===== App ===== */
function App() {
  const [activeView, setActiveView] = useState("runs");
  const [runs, setRuns] = useState([]);
  const [datasets, setDatasets] = useState([]);
  const [filterDataset, setFilterDataset] = useState("");
  const [filterCommit, setFilterCommit] = useState("");
  const [loading, setLoading] = useState(true);
  const [selectedRun, setSelectedRun] = useState(null);
  const [showTrigger, setShowTrigger] = useState(false);
  const [logViewerJobId, setLogViewerJobId] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [runners, setRunners] = useState([]);
  const [runnersLoading, setRunnersLoading] = useState(true);
  const [schedules, setSchedules] = useState([]);
  const [schedulesLoading, setSchedulesLoading] = useState(true);
  const [managedDatasets, setManagedDatasets] = useState([]);
  const [managedDatasetsLoading, setManagedDatasetsLoading] = useState(true);
  const [managedPresets, setManagedPresets] = useState([]);
  const [managedPresetsLoading, setManagedPresetsLoading] = useState(true);
  const [yamlPresets, setYamlPresets] = useState([]);
  const [alertRules, setAlertRules] = useState([]);
  const [alertRulesLoading, setAlertRulesLoading] = useState(true);
  const [alertEvents, setAlertEvents] = useState([]);
  const [alertEventsLoading, setAlertEventsLoading] = useState(true);
  const [githubRepoUrl, setGithubRepoUrl] = useState("");

  const fetchRuns = useCallback(async () => {
    setLoading(prev => runs.length === 0 ? true : prev);
    const params = new URLSearchParams();
    if (filterDataset) params.set("dataset", filterDataset);
    if (filterCommit) params.set("commit", filterCommit);
    params.set("limit", "200");
    try {
      const res = await fetch(`/api/runs?${params}`);
      setRuns(await res.json());
    } finally { setLoading(false); }
  }, [filterDataset, filterCommit, runs.length]);

  const fetchDatasets = useCallback(async () => {
    const res = await fetch("/api/datasets");
    setDatasets(await res.json());
    try {
      const cfg = await (await fetch("/api/config")).json();
      if (cfg.github_repo_url) setGithubRepoUrl(cfg.github_repo_url);
    } catch {}
  }, []);

  const fetchManagedDatasets = useCallback(async () => {
    setManagedDatasetsLoading(prev => managedDatasets.length === 0 ? true : prev);
    try {
      const res = await fetch("/api/managed-datasets");
      setManagedDatasets(await res.json());
    } catch {}
    finally { setManagedDatasetsLoading(false); }
  }, [managedDatasets.length]);

  const fetchManagedPresets = useCallback(async () => {
    setManagedPresetsLoading(prev => managedPresets.length === 0 ? true : prev);
    try {
      const [mRes, cRes, yRes] = await Promise.all([
        fetch("/api/managed-presets"),
        fetch("/api/config"),
        fetch("/api/yaml-config"),
      ]);
      const managed = await mRes.json();
      const config = await cRes.json();
      const yamlCfg = await yRes.json();
      setManagedPresets(managed);
      const managedNames = new Set(managed.map(p => p.name));
      const yamlPNames = (config.presets || []).filter(n => !managedNames.has(n));
      const yamlPMap = yamlCfg.presets || {};
      setYamlPresets(yamlPNames.map(n => ({ name: n, config: yamlPMap[n] || {} })));
    } catch {}
    finally { setManagedPresetsLoading(false); }
  }, [managedPresets.length]);

  const fetchJobs = useCallback(async () => {
    try { const res = await fetch("/api/jobs"); setJobs(await res.json()); } catch {}
  }, []);

  const fetchRunners = useCallback(async () => {
    setRunnersLoading(prev => runners.length === 0 ? true : prev);
    try { const res = await fetch("/api/runners"); setRunners(await res.json()); } catch {}
    finally { setRunnersLoading(false); }
  }, [runners.length]);

  const fetchSchedules = useCallback(async () => {
    setSchedulesLoading(prev => schedules.length === 0 ? true : prev);
    try { const res = await fetch("/api/schedules"); setSchedules(await res.json()); } catch {}
    finally { setSchedulesLoading(false); }
  }, [schedules.length]);

  const fetchAlertRules = useCallback(async () => {
    setAlertRulesLoading(prev => alertRules.length === 0 ? true : prev);
    try { const res = await fetch("/api/alert-rules"); setAlertRules(await res.json()); } catch {}
    finally { setAlertRulesLoading(false); }
  }, [alertRules.length]);

  const fetchAlertEvents = useCallback(async () => {
    setAlertEventsLoading(prev => alertEvents.length === 0 ? true : prev);
    try { const res = await fetch("/api/alert-events?limit=500"); setAlertEvents(await res.json()); } catch {}
    finally { setAlertEventsLoading(false); }
  }, [alertEvents.length]);

  useEffect(() => { fetchRuns(); fetchDatasets(); fetchJobs(); fetchRunners(); fetchSchedules(); fetchManagedDatasets(); fetchManagedPresets(); fetchAlertRules(); fetchAlertEvents(); }, [fetchRuns, fetchDatasets, fetchJobs, fetchRunners, fetchSchedules, fetchManagedDatasets, fetchManagedPresets, fetchAlertRules, fetchAlertEvents]);

  // Auto-refresh the active view every 10 seconds
  useEffect(() => {
    const interval = setInterval(() => {
      fetchJobs();
      fetchAlertEvents();
      if (activeView === "runs")       { fetchRuns(); }
      if (activeView === "datasets")   { fetchManagedDatasets(); }
      if (activeView === "presets")    { fetchManagedPresets(); }
      if (activeView === "runners")    { fetchRunners(); }
      if (activeView === "scheduling") { fetchSchedules(); }
      if (activeView === "alerts")     { fetchAlertRules(); fetchAlertEvents(); }
    }, 10000);
    return () => clearInterval(interval);
  }, [activeView, fetchRuns, fetchJobs, fetchRunners, fetchSchedules, fetchManagedDatasets, fetchManagedPresets, fetchAlertRules, fetchAlertEvents]);

  // Fast polling (3s) when jobs are actively running
  useEffect(() => {
    const hasActive = jobs.some(j => j.status==="running" || j.status==="pending" || j.status==="cancelling");
    if (!hasActive) return;
    const interval = setInterval(() => { fetchJobs(); fetchRuns(); }, 3000);
    return () => clearInterval(interval);
  }, [jobs, fetchJobs, fetchRuns]);

  async function openDetail(id) {
    try {
      const res = await fetch(`/api/runs/${id}`);
      setSelectedRun(await res.json());
    } catch {}
  }

  async function deleteRun(id) {
    try {
      await fetch(`/api/runs/${id}`, { method: "DELETE" });
      setSelectedRun(null);
      fetchRuns();
    } catch {}
  }

  const viewTitles = { runs: "Runs", analytics: "Analytics", reporting: "Reporting", datasets: "Datasets", presets: "Presets", runners: "Runners", scheduling: "Scheduling", alerts: "Alerts", ingestion: "Ingestion", retrieval: "Retrieval", models: "Models", settings: "Settings" };

  const activeJobCount = jobs.filter(j => j.status==="running" || j.status==="pending" || j.status==="cancelling").length;

  const footerText = useMemo(() => {
    if (activeView === "runs") {
      const base = loading ? "Loading\u2026" : `${runs.length} run${runs.length!==1?'s':''} found`;
      return activeJobCount > 0 ? `${base} \u00B7 ${activeJobCount} job${activeJobCount!==1?'s':''} active` : base;
    }
    if (activeView === "analytics") {
      return loading ? "Loading\u2026" : `${runs.length} run${runs.length!==1?'s':''} available for analysis`;
    }
    if (activeView === "datasets") {
      return managedDatasetsLoading ? "Loading\u2026" : `${managedDatasets.length} dataset${managedDatasets.length!==1?'s':''} configured`;
    }
    if (activeView === "presets") {
      const total = managedPresets.length + yamlPresets.length;
      return managedPresetsLoading ? "Loading\u2026" : `${total} preset${total!==1?'s':''} (${managedPresets.length} managed, ${yamlPresets.length} from config)`;
    }
    if (activeView === "runners") return runnersLoading ? "Loading\u2026" : `${runners.length} runner${runners.length!==1?'s':''} registered`;
    if (activeView === "scheduling") return schedulesLoading ? "Loading\u2026" : `${schedules.length} schedule${schedules.length!==1?'s':''} configured`;
    if (activeView === "alerts") {
      const unack = alertEvents.filter(e=>!e.acknowledged).length;
      return alertEventsLoading ? "Loading\u2026" : `${alertRules.length} rule${alertRules.length!==1?'s':''}, ${alertEvents.length} event${alertEvents.length!==1?'s':''} (${unack} unacknowledged)`;
    }
    if (activeView === "settings") {
      return "Manage portal deployment and system settings";
    }
    if (activeView === "ingestion") {
      return "Upload documents and run custom ingestion jobs";
    }
    if (activeView === "retrieval") {
      const successCount = runs.filter(r => r.success === 1).length;
      return `Query against LanceDB from ${successCount} successful run${successCount !== 1 ? 's' : ''}`;
    }
    if (activeView === "models") {
      return "Send test payloads to HuggingFace models and inspect responses";
    }
    if (activeView === "reporting") {
      return loading ? "Loading\u2026" : `${runs.length} run${runs.length!==1?'s':''} available for reporting`;
    }
    return "";
  }, [activeView, runs.length, activeJobCount, managedDatasets.length, managedPresets.length, yamlPresets.length, runners.length, schedules.length, alertRules.length, alertEvents.length, alertEvents, loading, managedDatasetsLoading, managedPresetsLoading, runnersLoading, schedulesLoading, alertRulesLoading, alertEventsLoading]);

  return (
    <div className="app-layout">
      <Sidebar activeView={activeView} onNavigate={setActiveView} alertBadgeCount={alertEvents.filter(e=>!e.acknowledged).length} githubRepoUrl={githubRepoUrl} />
      <div className="main-wrapper">
        <Header title={viewTitles[activeView] || "Portal"}>
          {activeView==="runs" && (
            <button className="btn btn-ghost btn-icon" onClick={()=>{fetchRuns();fetchJobs();}} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="analytics" && (
            <button className="btn btn-ghost btn-icon" onClick={fetchRuns} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="datasets" && (
            <button className="btn btn-ghost btn-icon" onClick={fetchManagedDatasets} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="presets" && (
            <button className="btn btn-ghost btn-icon" onClick={fetchManagedPresets} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="runners" && (
            <button className="btn btn-ghost btn-icon" onClick={fetchRunners} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="scheduling" && (
            <button className="btn btn-ghost btn-icon" onClick={fetchSchedules} title="Refresh"><IconRefresh /></button>
          )}
          {activeView==="alerts" && (
            <button className="btn btn-ghost btn-icon" onClick={()=>{fetchAlertRules();fetchAlertEvents();}} title="Refresh"><IconRefresh /></button>
          )}
        </Header>
        <div className="main-content">
          {activeView==="runs" && (
            <RunsView runs={runs} datasets={datasets} loading={loading}
              filterDataset={filterDataset} setFilterDataset={setFilterDataset}
              filterCommit={filterCommit} setFilterCommit={setFilterCommit}
              onRefresh={()=>{fetchRuns();fetchJobs();}} onSelectRun={openDetail}
              onDeleteRun={deleteRun}
              onTrigger={()=>setShowTrigger(true)} jobs={jobs} runners={runners} githubRepoUrl={githubRepoUrl}
              onViewLogs={setLogViewerJobId} />
          )}
          {activeView==="analytics" && (
            <AnalyticsView runs={runs} datasets={datasets} loading={loading} onRefresh={fetchRuns} />
          )}
          {activeView==="reporting" && (
            <ReportingView runs={runs} datasets={datasets} loading={loading} />
          )}
          {activeView==="datasets" && (
            <DatasetsView managedDatasets={managedDatasets}
              loading={managedDatasetsLoading} onRefresh={fetchManagedDatasets} runners={runners} />
          )}
          {activeView==="presets" && (
            <PresetsView managedPresets={managedPresets} yamlPresets={yamlPresets}
              loading={managedPresetsLoading} onRefresh={fetchManagedPresets} />
          )}
          {activeView==="runners" && <RunnersView runners={runners} loading={runnersLoading} onRefresh={fetchRunners} githubRepoUrl={githubRepoUrl} />}
          {activeView==="scheduling" && <SchedulingView schedules={schedules} loading={schedulesLoading} onRefresh={fetchSchedules} runners={runners} />}
          {activeView==="alerts" && (
            <AlertsView alertRules={alertRules} alertEvents={alertEvents}
              alertRulesLoading={alertRulesLoading} alertEventsLoading={alertEventsLoading}
              onRefresh={()=>{fetchAlertRules();fetchAlertEvents();}}
              onSelectRun={openDetail} githubRepoUrl={githubRepoUrl} />
          )}
          {activeView==="settings" && (
            <SettingsView />
          )}
          {activeView==="ingestion" && (
            <IngestionView jobs={jobs} onViewLogs={setLogViewerJobId} />
          )}
          {activeView==="retrieval" && (
            <RetrievalView runs={runs} />
          )}
          {activeView==="models" && (
            <ModelsView />
          )}
        </div>
        <Footer>
          <span>{footerText}</span>
          <span>Harness Portal</span>
        </Footer>
      </div>
      {selectedRun && <RunDetailModal run={selectedRun} onClose={()=>setSelectedRun(null)} onDelete={deleteRun} githubRepoUrl={githubRepoUrl} />}
      {showTrigger && <TriggerModal onClose={()=>setShowTrigger(false)} onTriggered={()=>{fetchJobs();setTimeout(fetchJobs,1000);}} />}
      {logViewerJobId && <LogViewerModal jobId={logViewerJobId} onClose={()=>setLogViewerJobId(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
